<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Console | Symboit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: rgba(255,255,255,0.03); --primary: #6366f1; --accent: #10b981; --text: #fff; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
        .glass-header { background: var(--card); backdrop-filter: blur(10px); padding: 1.5rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .stat-card { background: var(--card); padding: 1.5rem; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .stat-val { font-size: 2rem; font-weight: 600; color: var(--primary); }
        .tools-area { background: var(--card); padding: 2rem; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; margin-bottom: 1rem; outline: none; }
        .btn { width: 100%; padding: 1rem; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; background: var(--primary); color: white; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: rgba(255,255,255,0.02); border-radius: 12px; margin-top: 0.8rem; border: 1px solid rgba(255,255,255,0.03); }
        .status { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .active { background: rgba(16,185,129,0.1); color: var(--accent); }
        #message { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem; border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <div style="max-width: 900px; margin: 0 auto;">
        <div class="glass-header">
            <div><h1 style="font-size:1.2rem; letter-spacing:2px;">ORGANIZER CONSOLE</h1></div>
            <div style="text-align:right;">
                <div id="u-name" style="font-weight:600;">...</div>
                <a href="javascript:logout()" style="color:var(--text-dim); font-size:0.7rem; text-decoration:none;">Logout</a>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:2rem;">
            <div class="stat-card"><div class="stat-val" id="m-count">0</div><div style="font-size:0.8rem; color:var(--text-dim)">Total Mentors</div></div>
            <div class="stat-card" style="background:linear-gradient(135deg, rgba(99,102,241,0.1), rgba(16,185,129,0.1)); border:1px solid rgba(255,255,255,0.1);">
                <div style="font-weight:600; color:var(--accent);">ENTERPRISE PLAN</div>
                <div style="font-size:0.7rem; color:var(--text-dim); margin-top:5px;">AI Features Active</div>
            </div>
        </div>

        <div class="tools-area">
            <h3 style="margin-bottom:1rem; font-weight:300;">Invite Professional Mentors</h3>
            <input type="email" id="email" placeholder="mentor@gmail.com">
            <button class="btn" onclick="send()">Send Branded Invitation</button>

            <div style="margin-top:2rem;">
                <p style="font-size:0.75rem; color:var(--text-dim); margin-bottom:1rem; font-weight:600; letter-spacing:1px;">MANAGED NETWORK</p>
                <div id="list"></div>
            </div>
        </div>
    </div>
    <div id="message"></div>

    <script>
        let user = JSON.parse(localStorage.getItem('symboit_user'));
        if(!user || user.role !== 'organizer') window.location.href = '/';
        document.getElementById('u-name').innerText = user.name;

        function refresh() {
            const list = document.getElementById('list');
            Promise.all([
                fetch(`/api/users?role=mentor&organizerEmail=${user.organizerEmail}`).then(r => r.json()),
                fetch(`/api/invitations?organizerEmail=${user.organizerEmail}`).then(r => r.json())
            ]).then(([uData, iData]) => {
                list.innerHTML = '';
                uData.users.forEach(u => list.innerHTML += `<div class="list-item"><div>${u.name}<br><small style="color:var(--text-dim)">${u.email}</small></div><span class="status active">ACTIVE</span></div>`);
                iData.invites.filter(inv => inv.role === 'mentor' && inv.status === 'pending').forEach(inv => list.innerHTML += `<div class="list-item" style="opacity:0.6;"><div>${inv.email}<br><small style="color:var(--text-dim)">Awaiting Acceptance</small></div><span class="status" style="color:#fbbf24">PENDING</span></div>`);
                document.getElementById('m-count').innerText = uData.users.length;
            });
        }

        function send() {
            const email = document.getElementById('email').value;
            fetch('/api/invite', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, role: 'mentor', inviterEmail: user.email, organizerEmail: user.organizerEmail })
            }).then(r => r.json()).then(data => {
                const msg = document.getElementById('message');
                msg.style.display = 'block';
                msg.style.background = '#10b981';
                msg.innerText = 'Branded Mail Processed';
                if(data.inviteLink) msg.innerHTML += `<br><small style="font-size:0.6rem">Fallback: ${data.inviteLink}</small>`;
                setTimeout(() => msg.style.display = 'none', 6000);
                refresh();
            });
        }

        function logout() { localStorage.removeItem('symboit_user'); window.location.href = '/'; }
        refresh();
    </script>
</body>
</html>
