<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Console | Symboit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: rgba(255,255,255,0.03); --primary: #6366f1; --accent: #10b981; --danger: #ef4444; --gold: #fbbf24; --text: #fff; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; min-height: 100vh; overflow-y: auto; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem; max-width: 1200px; margin: 0 auto; }
        .glass-card { background: var(--card); backdrop-filter: blur(12px); padding: 2rem; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); }
        
        .progress-container { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: 1s ease; }
        
        .btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; font-family: inherit; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        
        input, select, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; margin-bottom: 15px; font-family: inherit; }
        
        .list-item { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 5px; background: rgba(99, 102, 241, 0.1); color: var(--primary); }

        #message { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 2rem; border-radius: 12px; display: none; z-index: 1000; }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .grid { grid-template-columns: 1fr; gap: 1rem; }
            .glass-card { padding: 1.5rem; }
            .list-item { flex-direction: column; align-items: flex-start; gap: 10px; }
            .list-item > div { width: 100%; }
        }
    </style>
</head>
<body>
    <div style="max-width:1200px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; margin-bottom:3rem;">
        <h1 style="font-size:1.2rem; letter-spacing:2px; font-weight:600;">SYMBOIT <span style="font-weight:300; color:var(--text-dim)">ORGANIZER</span></h1>
        <button class="btn btn-primary" onclick="logout()">Logout</button>
    </div>

    <div class="grid">
        <!-- Manage Genres (Activities) -->
        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                <h2 style="font-weight:400;">CURRICULUM</h2>
                <button class="btn" style="background:rgba(251, 191, 36, 0.1); color:var(--gold); font-size:0.65rem;" onclick="resetCurriculum()">Re-sync Official Activities</button>
            </div>
            <form id="genre-form" onsubmit="saveGenre(event)">
                <input type="hidden" id="genre-id">
                <input type="text" id="g-title" placeholder="Activity Title (e.g. Plantation Drive)" required>
                <textarea id="g-desc" placeholder="Brief Description..." rows="2" required></textarea>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="g-pts" placeholder="Points" required>
                    <select id="g-type">
                        <option value="weeks">2-Week Project</option>
                        <option value="event">Single Day Event</option>
                    </select>
                </div>
                <div style="margin-bottom:15px; display:flex; align-items:center; gap:10px;">
                    <input type="checkbox" id="g-rubric" style="width:auto; margin:0;">
                    <label for="g-rubric" style="font-size:0.8rem; color:var(--text-dim);">Mark as Priority Rubric</label>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Save Activity</button>
                <button type="button" class="btn" style="width:100%; margin-top:5px; background:transparent; color:var(--text-dim);" onclick="resetForm()">Cancel</button>
            </form>

            <div style="margin-top:2.5rem;">
                <h3 style="font-size:0.8rem; color:var(--text-dim); margin-bottom:1rem; letter-spacing:1px;">EXISTING ACTIVITIES</h3>
                <div id="genre-list"></div>
            </div>
        </div>

        <!-- Mentors & Invites -->
        <div class="glass-card">
            <h2 style="margin-bottom:1.5rem; font-weight:400;">MENTOR NETWORK</h2>
            <div style="margin-bottom:2rem;">
                <input type="email" id="invite-email" placeholder="Mentor Email">
                <button class="btn btn-primary" style="width:100%;" onclick="sendInvite()">Send Invitation Link</button>
            </div>
            
            <h3 style="font-size:0.8rem; color:var(--text-dim); margin-bottom:1rem; letter-spacing:1px;">MENTOR NETWORK</h3>
            <div id="mentor-list"></div>
        </div>
    </div>

    <div id="message"></div>

    <script>
        let user = JSON.parse(localStorage.getItem('symboit_user'));
        if(!user || user.role !== 'organizer') window.location.href = '/';

        async function sync() {
            try {
                // Fetch Genres
                const gRes = await fetch(`/api/genres?organizerEmail=${user.email}`).then(r => r.json());
                renderGenres(gRes.genres);

                // Fetch Mentors
                const mRes = await fetch(`/api/users?organizerEmail=${user.email}&role=mentor`).then(r => r.json());
                const mentors = mRes.users || [];

                // Fetch Students
                const sRes = await fetch(`/api/users?organizerEmail=${user.email}&role=student`).then(r => r.json());
                const students = sRes.users || [];

                // Fetch all submissions for point calculation
                const subRes = await fetch(`/api/submissions?organizerEmail=${user.email}`).then(r => r.json());
                const allSubmissions = subRes.submissions || [];

                // Fetch Invitations to show pending mentors
                const iRes = await fetch(`/api/invitations?organizerEmail=${user.email}`).then(r => r.json());
                const invitations = iRes.invites || [];

                renderMentors(mentors, invitations, students, allSubmissions);
            } catch (e) { console.error(e); }
        }

        function renderGenres(genres) {
            const list = document.getElementById('genre-list');
            list.innerHTML = '';
            genres.forEach(g => {
                list.innerHTML += `
                    <div class="list-item">
                        <div>
                            <div style="font-weight:600; font-size:0.9rem;">${g.title} <span class="badge">${g.pts} PTS</span></div>
                            <div style="font-size:0.7rem; color:var(--text-dim);">${g.type === 'weeks' ? '2-Week' : 'Event'} • ${g.isRubric ? 'Priority' : 'Normal'}</div>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button onclick="editGenre('${g._id}', '${g.title}', '${g.desc}', ${g.pts}, '${g.type}', ${g.isRubric})" style="background:none; border:none; color:var(--primary); cursor:pointer; font-size:0.8rem;">Edit</button>
                            <button onclick="deleteGenre('${g._id}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:0.8rem;">Del</button>
                        </div>
                    </div>`;
            });
        }

        function renderMentors(mentors, invitations, students, submissions) {
            const list = document.getElementById('mentor-list');
            list.innerHTML = '';

            // 1. Show Active Mentors
            mentors.forEach(m => {
                const myStudents = students.filter(s => s.mentorEmail === m.email);
                
                list.innerHTML += `
                    <div class="list-item" style="display:block;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                            <div>
                                <div style="font-weight:600; font-size:1rem;">${m.name || m.email.split('@')[0]}</div>
                                <div style="font-size:0.75rem; color:var(--text-dim);">${m.email}</div>
                            </div>
                            <div style="text-align:right;">
                                <div style="display:flex; align-items:center; gap:10px; justify-content:flex-end;">
                                    <span class="badge" style="background:rgba(16, 185, 129, 0.1); color:var(--accent); font-size:0.55rem;">ACTIVE</span>
                                    <span class="badge" style="background:rgba(99, 102, 241, 0.1); color:var(--primary);">${myStudents.length} Students</span>
                                    <button onclick="deleteMentor('${m._id}')" class="btn btn-danger" style="padding:5px 10px; font-size:0.6rem;">Remove</button>
                                </div>
                            </div>
                        </div>
                        
                        <div style="margin: 10px 0 20px 0;">
                            <div style="display:flex; justify-content:space-between; font-size:0.65rem; color:var(--text-dim); margin-bottom:5px;">
                                <span>MENTOR OVERALL PROGRESS</span>
                                <span style="color:var(--accent); font-weight:bold;">${(() => {
                                    const totalPts = myStudents.reduce((acc, s) => {
                                        const sSubs = submissions.filter(sub => sub.studentEmail === s.email && sub.status === 'approved');
                                        return acc + sSubs.reduce((a, c) => a + (c.pointsAwarded || 10), 0);
                                    }, 0);
                                    const maxPossible = myStudents.length * 100;
                                    return maxPossible > 0 ? Math.round((totalPts / maxPossible) * 100) : 0;
                                })()}%</span>
                            </div>
                            <div class="progress-container"><div class="progress-bar" style="width:${(() => {
                                const totalPts = myStudents.reduce((acc, s) => {
                                    const sSubs = submissions.filter(sub => sub.studentEmail === s.email && sub.status === 'approved');
                                    return acc + sSubs.reduce((a, c) => a + (c.pointsAwarded || 10), 0);
                                }, 0);
                                const maxPossible = myStudents.length * 100;
                                return maxPossible > 0 ? Math.round((totalPts / maxPossible) * 100) : 0;
                            })()}%"></div></div>
                        </div>
                        
                        ${myStudents.length > 0 ? `
                        <div style="margin-top:15px; border-top:1px solid rgba(255,255,255,0.05); padding-top:10px;">
                            <p style="font-size:0.6rem; color:var(--text-dim); margin-bottom:10px; letter-spacing:1px; text-transform:uppercase;">Student Progress</p>
                            ${myStudents.map(s => {
                                const sSubs = submissions.filter(sub => sub.studentEmail === s.email && sub.status === 'approved');
                                const pts = sSubs.reduce((acc, curr) => acc + (curr.pointsAwarded || 10), 0);
                                return `
                                <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.02); padding:8px 12px; border-radius:10px; margin-bottom:5px;">
                                    <div style="flex:1;">
                                        <div style="font-size:0.8rem; font-weight:600;">${s.name || s.email.split('@')[0]}</div>
                                        <div style="font-size:0.65rem; color:var(--text-dim);">${s.email}</div>
                                    </div>
                                    <div style="display:flex; align-items:center; gap:15px;">
                                        ${s.driveRootFolderId ? `<a href="https://drive.google.com/drive/folders/${s.driveRootFolderId}" target="_blank" title="View Drive" style="text-decoration:none; font-size:1.2rem;">📂</a>` : '<span title="No Drive Yet" style="opacity:0.2; font-size:1.2rem;">📂</span>'}
                                        <div style="text-align:right;">
                                            <span style="font-size:0.9rem; font-weight:600; color:var(--accent);">${pts}</span>
                                            <span style="font-size:0.6rem; color:var(--text-dim);">/ 100</span>
                                        </div>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                        ` : '<p style="font-size:0.7rem; color:var(--text-dim); font-style:italic;">No students assigned yet.</p>'}
                    </div>`;
            });

            // 2. Show Pending Invitations (for mentors)
            invitations.filter(i => i.role === 'mentor' && i.status === 'pending').forEach(i => {
                list.innerHTML += `
                    <div class="list-item" style="border: 1px dashed rgba(251, 191, 36, 0.3); opacity: 0.8; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div style="font-weight:600; font-size:0.9rem; color:var(--text-dim);">${i.email}</div>
                            <div style="font-size:0.6rem; color:var(--gold); letter-spacing:1px; margin-top:4px;">INVITATION SENT</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span class="badge" style="background:rgba(251, 191, 36, 0.1); color:var(--gold); font-size:0.55rem;">PENDING</span>
                            <button onclick="deleteInvite('${i._id}')" class="btn btn-danger" style="padding:5px 10px; font-size:0.6rem;">Cancel</button>
                        </div>
                    </div>`;
            });
        }

        async function deleteInvite(id) {
            if(!confirm('Cancel this invitation?')) return;
            await fetch(`/api/invitations/${id}`, { method: 'DELETE' });
            sync();
        }

        async function deleteMentor(id) {
            if(!confirm('Remove this mentor? All their students will remain but will be unassigned.')) return;
            await fetch(`/api/users/${id}`, { method: 'DELETE' });
            sync();
        }

        async function saveGenre(e) {
            e.preventDefault();
            const id = document.getElementById('genre-id').value;
            const data = {
                organizerEmail: user.email,
                title: document.getElementById('g-title').value,
                desc: document.getElementById('g-desc').value,
                pts: document.getElementById('g-pts').value,
                type: document.getElementById('g-type').value,
                isRubric: document.getElementById('g-rubric').checked
            };

            const url = id ? `/api/genres/${id}` : '/api/genres';
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }).then(r => r.json());
                if(res.success) {
                    showMessage(id ? 'Activity Updated!' : 'Activity Created!');
                    resetForm();
                    sync();
                }
            } catch (e) { showMessage('Error saving genre', true); }
        }

        function editGenre(id, title, desc, pts, type, isRubric) {
            document.getElementById('genre-id').value = id;
            document.getElementById('g-title').value = title;
            document.getElementById('g-desc').value = desc;
            document.getElementById('g-pts').value = pts;
            document.getElementById('g-type').value = type;
            document.getElementById('g-rubric').checked = isRubric;
        }

        async function deleteGenre(id) {
            if(!confirm('Delete this activity?')) return;
            await fetch(`/api/genres/${id}`, { method: 'DELETE' });
            sync();
        }

        async function resetCurriculum() {
            if(!confirm('This will delete your current activities and re-load the full 24-activity official set. Continue?')) return;
            const res = await fetch('/api/genres/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ organizerEmail: user.email })
            }).then(r => r.json());
            if(res.success) {
                showMessage('Curriculum Reset Successful! ✨');
                sync();
            }
        }

        function resetForm() {
            document.getElementById('genre-id').value = '';
            document.getElementById('genre-form').reset();
        }

        async function sendInvite() {
            const email = document.getElementById('invite-email').value;
            if(!email) return showMessage('Enter email', true);
            const res = await fetch('/api/invite', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, inviterEmail: user.email, organizerEmail: user.email, role: 'mentor' })
            }).then(r => r.json());
            if(res.success) {
                showMessage('Invitation sent! 📧');
                document.getElementById('invite-email').value = '';
            }
        }

        function showMessage(txt, isError = false) {
            const m = document.getElementById('message');
            m.innerText = txt;
            m.style.display = 'block';
            m.style.background = isError ? 'var(--danger)' : 'var(--accent)';
            m.style.color = 'white';
            setTimeout(() => m.style.display = 'none', 3000);
        }

        function logout() { localStorage.removeItem('symboit_user'); window.location.href = '/'; }
        sync();
    </script>
</body>
</html>
