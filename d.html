<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Console | Symboit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030014;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.05);
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --accent: #10b981;
            --danger: #ef4444;
            --gold: #fbbf24;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* Shared Styles */
        .btn { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; font-family: inherit; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        input, select, textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; margin-bottom: 16px; font-family: inherit; }

        /* Desktop Container */
        .desktop-container { display: none; padding: 3rem 2rem; max-width: 1300px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 2.5rem; }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(16px); padding: 2.5rem; border-radius: 24px; border: 1px solid var(--card-border); }
        .list-item { background: rgba(255,255,255,0.02); padding: 18px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }

        /* Mobile Container */
        .mobile-container { display: block; padding: 1rem 1.5rem 7.5rem 1.5rem; }
        .header-mobile { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0 2rem 0; }
        .view { display: none; }
        .view.active { display: block; }
        .mentor-card-mob { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Circular Progress (AICTE Only) */
        .circle-progress { width: 45px; height: 45px; border-radius: 50%; background: conic-gradient(var(--primary) var(--perc), rgba(255,255,255,0.05) 0); position: relative; display: flex; align-items: center; justify-content: center; }
        .circle-progress::after { content: ''; position: absolute; width: 37px; height: 37px; background: #030014; border-radius: 50%; }
        .circle-val { position: relative; z-index: 1; font-size: 0.65rem; font-weight: 600; }
        
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.05); }

        /* Advanced Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(3, 0, 20, 0.95); backdrop-filter: blur(25px); height: 80px; display: flex; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; padding: 0 10px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-dim); text-decoration: none; font-size: 0.65rem; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
        
        /* Central Button */
        .center-btn-wrap { position: relative; width: 80px; height: 80px; margin-top: -40px; }
        .center-btn { width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #ec4899); display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5); border: 5px solid #030014; cursor: pointer; position: absolute; left: 50%; transform: translateX(-50%); transition: 0.2s; }
        .center-btn:active { transform: translateX(-50%) scale(0.9); }
        .center-btn span { font-size: 1.8rem; }
        .center-label { position: absolute; bottom: -25px; width: 100%; text-align: center; font-size: 0.7rem; font-weight: 600; color: var(--text-dim); }

        /* Shared Components */
        #message { position: fixed; top: 1rem; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 12px; z-index: 3000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-content { background: #0d0d19; padding: 2.5rem; border-radius: 35px; border: 1px solid var(--primary); width: 100%; max-width: 500px; position: relative; }
        .close-btn { position: absolute; top: 1rem; right: 1.5rem; color: var(--text-dim); cursor: pointer; font-size: 1.5rem; }

        @media (min-width: 1024px) {
            .desktop-container { display: block; }
            .mobile-container, .bottom-nav { display: none; }
        }
    </style>
</head>
<body>
    <div id="message"></div>

    <!-- DESKTOP VIEW -->
    <div class="desktop-container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:3rem;">
            <h1 style="font-size:1.2rem; letter-spacing:2px; font-weight:600;">SYMBOIT <span style="font-weight:300; color:var(--text-dim)">ORGANIZER</span></h1>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-primary" onclick="openReportModal()">📊 Portfolio Reports</button>
                <button class="btn btn-danger" onclick="logout()">Logout</button>
            </div>
        </div>
        <div class="grid">
            <div class="glass-card">
                <h2 style="margin-bottom:1.5rem; font-weight:400;">CURRICULUM</h2>
                <form onsubmit="saveGenre(event, 'desk')">
                    <input type="hidden" id="desk-genre-id">
                    <input type="text" id="desk-g-title" placeholder="Activity Title" required>
                    <textarea id="desk-g-desc" placeholder="Description" rows="2" required></textarea>
                    <div style="display:flex; gap:10px;">
                        <input type="number" id="desk-g-pts" placeholder="Points" required>
                        <select id="desk-g-type">
                            <option value="weeks">2-Week Project</option>
                            <option value="event">Single Day Event</option>
                        </select>
                    </div>
                    <label style="display:flex; align-items:center; gap:8px; font-size:0.8rem; margin-bottom:15px;">
                        <input type="checkbox" id="desk-g-rubric"> Mark as Priority Rubric
                    </label>
                    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Save Activity</button>
                </form>
                <div id="desk-genre-list" style="margin-top:2.5rem;"></div>
            </div>
            <div class="glass-card">
                <h2 style="margin-bottom:1.5rem; font-weight:400;">MENTOR NETWORK</h2>
                <div style="margin-bottom:2rem; display:flex; gap:10px;">
                    <input type="email" id="desk-invite-email" placeholder="Mentor Email" style="margin-bottom:0;">
                    <button class="btn btn-primary" onclick="sendInvite('desk')">Invite</button>
                </div>
                <div id="desk-mentor-list"></div>
            </div>
        </div>
    </div>

    <!-- MOBILE VIEW -->
    <div class="mobile-container">
        <div class="header-mobile">
            <div style="font-weight:600; font-size:1.1rem; letter-spacing:1px;">Symboit <span style="font-weight:300; color:var(--primary)">Org</span></div>
            <a href="javascript:logout()" style="color:var(--danger); text-decoration:none; font-size:0.8rem; font-weight:600;">Logout</a>
        </div>

        <div id="mob-view-aicte" class="view active">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.2rem;">
                <p style="font-size:0.7rem; letter-spacing:2px; color:var(--primary); font-weight:600;">AICTE PROGRESS</p>
                <button onclick="openReportModal()" style="background:rgba(139, 92, 246, 0.1); border:1px solid rgba(139, 92, 246, 0.2); color:var(--primary); padding:6px 12px; border-radius:8px; font-size:0.65rem; font-weight:600; cursor:pointer;">📊 REPORTS</button>
            </div>
            <div id="mob-aicte-list"></div>
        </div>
        
        <div id="mob-view-portfolio" class="view">
            <p style="font-size:0.7rem; letter-spacing:2px; color:var(--primary); margin-bottom:1.2rem; font-weight:600;">PORTFOLIO NETWORK</p>
            <div id="mob-portfolio-list"></div>
        </div>
        
        <div id="mob-view-mentors" class="view">
            <p style="font-size:0.7rem; letter-spacing:2px; color:var(--primary); margin-bottom:1.2rem; font-weight:600;">MENTOR NETWORK</p>
            <div class="mentor-card-mob" style="padding:1.2rem;">
                <h4 style="margin-bottom:1rem; font-weight:400;">Invite Mentor</h4>
                <input type="email" id="mob-invite-email" placeholder="Mentor Email" style="margin-bottom:10px;">
                <button class="btn-primary" style="width:100%; border-radius:10px; padding:10px; justify-content:center;" onclick="sendInvite('mob')">Send Invitation</button>
            </div>
            <div id="mob-mentor-mgmt-list"></div>
        </div>

        <div id="mob-view-curr" class="view">
            <p style="font-size:0.7rem; letter-spacing:2px; color:var(--primary); margin-bottom:1.2rem; font-weight:600;">CURRICULUM</p>
            <div class="mentor-card-mob" style="padding:1.2rem;">
                <h4 style="margin-bottom:1rem; font-weight:400;">Add Activity</h4>
                <form onsubmit="saveGenre(event, 'mob')">
                    <input type="hidden" id="mob-genre-id">
                    <input type="text" id="mob-g-title" placeholder="Title" required>
                    <input type="number" id="mob-g-pts" placeholder="Points" required>
                    <button type="submit" class="btn-primary" style="width:100%; border-radius:10px; padding:10px; justify-content:center;">Save</button>
                </form>
            </div>
            <div id="mob-genre-list"></div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchMobView('aicte', this)"><span>📋</span><span>AICTE</span></div>
        <div class="nav-item" onclick="switchMobView('portfolio', this)"><span>🌟</span><span>Portfolio</span></div>
        
        <div class="center-btn-wrap">
            <div class="center-btn" onclick="alert('Manage Events Triggered')"><span>📅</span></div>
            <div class="center-label">EVENTS</div>
        </div>
        
        <div class="nav-item" onclick="switchMobView('mentors', this)"><span>👥</span><span>Mentors</span></div>
        <div class="nav-item" onclick="switchMobView('curr', this)"><span>📞</span><span>CURR</span></div>
    </div>

    <!-- Shared Report Modal -->
    <div id="report-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeReportModal()">&times;</span>
            <h2 style="font-weight:400; margin-bottom:1.5rem;">Global Portfolio Report</h2>
            <select id="report-type" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); padding:12px; border-radius:10px; width:100%; color:white; margin-bottom:15px;">
                <option value="aicte">AICTE Portfolio (All-Time)</option>
                <option value="ach">Achievements (Range)</option>
                <option value="part">Participation (Range)</option>
            </select>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                <input type="date" id="report-from" style="padding:10px; border-radius:8px; border:none; background:rgba(255,255,255,0.05); color:white;">
                <input type="date" id="report-to" style="padding:10px; border-radius:8px; border:none; background:rgba(255,255,255,0.05); color:white;">
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                <button class="btn btn-primary" style="justify-content:center;" onclick="setFormat('pdf')" id="btn-pdf">PDF</button>
                <button class="btn" style="background:rgba(255,255,255,0.05); color:white; justify-content:center;" onclick="setFormat('docx')" id="btn-docx">Word</button>
            </div>
            <button class="btn btn-primary" style="width:100%; justify-content:center;" id="gen-btn" onclick="generateReport()">Generate Portfolio Report</button>
        </div>
    </div>

    <script>
        let user = JSON.parse(localStorage.getItem('symboit_user'));
        if(!user || user.role !== 'organizer') window.location.href = '/';

        function switchMobView(v, el) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById(`mob-view-${v}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            window.scrollTo(0,0);
        }

        async function sync() {
            try {
                const [gRes, mRes, sRes, subRes, achRes, partRes, iRes] = await Promise.all([
                    fetch(`/api/genres?organizerEmail=${user.email}`).then(r => r.json()),
                    fetch(`/api/users?organizerEmail=${user.email}&role=mentor`).then(r => r.json()),
                    fetch(`/api/users?organizerEmail=${user.email}&role=student`).then(r => r.json()),
                    fetch(`/api/submissions?organizerEmail=${user.email}`).then(r => r.json()),
                    fetch(`/api/achievements?organizerEmail=${user.email}`).then(r => r.json()),
                    fetch(`/api/participations?organizerEmail=${user.email}`).then(r => r.json()),
                    fetch(`/api/invitations?organizerEmail=${user.email}`).then(r => r.json())
                ]);

                const mentors = mRes.users || [];
                const students = sRes.users || [];
                const invites = iRes.invites || [];

                renderDesktop(gRes.genres, mentors, students, subRes.submissions, invites);
                renderMobile(gRes.genres, mentors, students, subRes.submissions, achRes.achievements, partRes.participations, invites);
            } catch(e) { console.error(e); }
        }

        function renderDesktop(genres, mentors, students, subs, invites) {
            const gList = document.getElementById('desk-genre-list');
            gList.innerHTML = genres.map(g => `
                <div class="list-item">
                    <div><div style="font-weight:600;">${g.title} <span class="badge">${g.pts} PTS</span></div><div style="font-size:0.7rem; color:var(--text-dim);">${g.type==='weeks'?'2-Week':'Event'}</div></div>
                    <div style="display:flex; gap:10px;"><button onclick="editGenre('${g._id}','${g.title}','${g.desc}',${g.pts},'${g.type}',${g.isRubric},'desk')" style="background:none; border:none; color:var(--primary); cursor:pointer;">Edit</button><button onclick="deleteGenre('${g._id}')" style="background:none; border:none; color:var(--danger); cursor:pointer;">Del</button></div>
                </div>`).join('');

            const mList = document.getElementById('desk-mentor-list');
            mList.innerHTML = mentors.map(m => {
                const myS = students.filter(s => s.mentorEmail === m.email);
                return `<div class="list-item" style="display:block;"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;"><div><div style="font-weight:600;">${m.name||m.email}</div></div><button class="btn-danger" style="padding:4px 8px; font-size:0.6rem;" onclick="deleteUser('${m._id}')">Remove</button></div>${myS.map(s => `<div style="font-size:0.7rem; color:var(--text-dim);">• ${s.name||s.email}</div>`).join('')}</div>`;
            }).join('') + invites.filter(i => i.status === 'pending').map(i => `<div class="list-item" style="border:1px dashed var(--gold);"><div style="font-size:0.8rem; color:var(--gold);">${i.email} (Pending)</div><button class="btn-danger" style="padding:4px 8px; font-size:0.6rem;" onclick="deleteInvite('${i._id}')">Cancel</button></div>`).join('');
        }

        function renderMobile(genres, mentors, students, subs, achs, parts, invites) {
            // AICTE
            document.getElementById('mob-aicte-list').innerHTML = mentors.map(m => {
                const myS = students.filter(s => s.mentorEmail === m.email);
                if(myS.length === 0) return '';
                const total = myS.reduce((acc, s) => acc + subs.filter(r => r.studentEmail === s.email && r.status === 'approved').reduce((a, c) => a + (c.pointsAwarded || 10), 0), 0);
                const perc = Math.min(100, Math.round((total / (myS.length * 100)) * 100));
                return `<div class="mentor-card-mob"><div style="display:flex; align-items:center; gap:1rem; margin-bottom:1rem;"><div class="circle-progress" style="--perc:${perc}%"><div class="circle-val">${perc}%</div></div><div><div style="font-weight:600; font-size:0.9rem;">${m.name||m.email.split('@')[0]}</div><div style="font-size:0.65rem; color:var(--text-dim);">Mentor • ${myS.length} Students</div></div></div>${myS.map(s => `<div class="student-row"><div style="font-size:0.8rem;">${s.name||s.email.split('@')[0]}</div><div style="display:flex; align-items:center; gap:10px;"><div style="font-size:0.75rem; font-weight:600; color:var(--primary);">${subs.filter(r => r.studentEmail === s.email && r.status === 'approved').reduce((a,c)=>a+(c.pointsAwarded||10),0)} PTS</div><a href="${s.driveRootFolderId?'https://drive.google.com/drive/folders/'+s.driveRootFolderId:'#'}" target="_blank" style="text-decoration:none; opacity:${s.driveRootFolderId?1:0.1}">📁</a></div></div>`).join('')}</div>`;
            }).join('');

            // Portfolio (Merged ACH & PART)
            document.getElementById('mob-portfolio-list').innerHTML = mentors.map(m => {
                const myS = students.filter(s => s.mentorEmail === m.email);
                if(myS.length === 0) return '';
                return `<div class="mentor-card-mob">
                    <div style="font-weight:600; font-size:0.9rem; margin-bottom:1.2rem;">${m.name||m.email.split('@')[0]}</div>
                    
                    <p style="font-size:0.6rem; color:var(--gold); font-weight:600; margin-bottom:10px; letter-spacing:1px;">ACHIEVEMENTS</p>
                    ${myS.map(s => {
                        const pts = achs.filter(r => r.studentEmail === s.email && r.status === 'approved').reduce((a,c)=>a+(c.pointsAwarded||10),0);
                        return `<div class="student-row"><div><div style="font-size:0.8rem;">${s.name||s.email.split('@')[0]}</div></div><div style="display:flex; align-items:center; gap:10px;"><div style="font-size:0.75rem; font-weight:600; color:var(--gold);">${pts} PTS</div><a href="${s.achievementFolderId?'https://drive.google.com/drive/folders/'+s.achievementFolderId:'#'}" target="_blank" style="text-decoration:none; opacity:${s.achievementFolderId?1:0.1}">📁</a></div></div>`;
                    }).join('')}

                    <p style="font-size:0.6rem; color:#38bdf8; font-weight:600; margin:20px 0 10px 0; letter-spacing:1px;">PARTICIPATIONS</p>
                    ${myS.map(s => {
                        const pts = parts.filter(r => r.studentEmail === s.email && r.status === 'approved').reduce((a,c)=>a+(c.pointsAwarded||10),0);
                        return `<div class="student-row"><div><div style="font-size:0.8rem;">${s.name||s.email.split('@')[0]}</div></div><div style="display:flex; align-items:center; gap:10px;"><div style="font-size:0.75rem; font-weight:600; color:#38bdf8;">${pts} PTS</div><a href="${s.participationFolderId?'https://drive.google.com/drive/folders/'+s.participationFolderId:'#'}" target="_blank" style="text-decoration:none; opacity:${s.participationFolderId?1:0.1}">📁</a></div></div>`;
                    }).join('')}
                </div>`;
            }).join('');

            // Mentors Management (Mobile)
            document.getElementById('mob-mentor-mgmt-list').innerHTML = mentors.map(m => `
                <div class="mentor-card-mob" style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                    <div><div style="font-weight:600; font-size:0.9rem;">${m.name||m.email}</div><div style="font-size:0.65rem; color:var(--accent);">ACTIVE</div></div>
                    <button class="btn-danger" style="padding:5px 10px; font-size:0.6rem; border-radius:8px;" onclick="deleteUser('${m._id}')">Remove</button>
                </div>`).join('') + invites.filter(i => i.status === 'pending').map(i => `
                <div class="mentor-card-mob" style="padding:15px; display:flex; justify-content:space-between; align-items:center; border:1px dashed var(--gold);">
                    <div><div style="font-weight:600; font-size:0.9rem; color:var(--text-dim);">${i.email}</div><div style="font-size:0.6rem; color:var(--gold);">PENDING</div></div>
                    <button class="btn-danger" style="padding:5px 10px; font-size:0.6rem; border-radius:8px;" onclick="deleteInvite('${i._id}')">Cancel</button>
                </div>`).join('');

            // Curriculum
            document.getElementById('mob-genre-list').innerHTML = genres.map(g => `<div class="mentor-card-mob" style="padding:12px 15px; display:flex; justify-content:space-between; align-items:center;"><div style="font-size:0.8rem; font-weight:600;">${g.title}</div><button onclick="editGenre('${g._id}','${g.title}','',${g.pts},'','','mob')" style="background:none; border:none; color:var(--primary); font-size:0.75rem;">Edit</button></div>`).join('');
        }

        async function saveGenre(e, prefix) {
            e.preventDefault();
            const id = document.getElementById(`${prefix}-genre-id`).value;
            const data = {
                organizerEmail: user.email,
                title: document.getElementById(`${prefix}-g-title`).value,
                desc: prefix === 'desk' ? document.getElementById('desk-g-desc').value : '',
                pts: document.getElementById(`${prefix}-g-pts`).value,
                type: prefix === 'desk' ? document.getElementById('desk-g-type').value : 'event',
                isRubric: prefix === 'desk' ? document.getElementById('desk-g-rubric').checked : false
            };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/genres/${id}` : '/api/genres';
            await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            document.getElementById(`${prefix}-genre-id`).value = '';
            if(prefix==='mob') document.getElementById('mob-g-title').value = '';
            sync(); showMessage('Saved! ✨');
        }

        function editGenre(id, title, desc, pts, type, isRubric, prefix) {
            document.getElementById(`${prefix}-genre-id`).value = id;
            document.getElementById(`${prefix}-g-title`).value = title;
            document.getElementById(`${prefix}-g-pts`).value = pts;
            if(prefix === 'desk') {
                document.getElementById('desk-g-desc').value = desc;
                document.getElementById('desk-g-type').value = type;
                document.getElementById('desk-g-rubric').checked = isRubric;
            }
            window.scrollTo(0,0);
        }

        async function sendInvite(prefix) {
            const email = document.getElementById(`${prefix}-invite-email`).value;
            if(!email) return;
            await fetch('/api/invite', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, inviterEmail: user.email, organizerEmail: user.email, role: 'mentor' }) });
            document.getElementById(`${prefix}-invite-email`).value = '';
            sync(); showMessage('Invitation Sent! 📧');
        }

        async function deleteGenre(id) { if(confirm('Delete activity?')) { await fetch(`/api/genres/${id}`, { method: 'DELETE' }); sync(); } }
        async function deleteUser(id) { if(confirm('Remove this mentor?')) { await fetch(`/api/users/${id}`, { method: 'DELETE' }); sync(); } }
        async function deleteInvite(id) { if(confirm('Cancel invitation?')) { await fetch(`/api/invitations/${id}`, { method: 'DELETE' }); sync(); } }

        function openReportModal() { document.getElementById('report-modal').style.display = 'flex'; }
        function closeReportModal() { document.getElementById('report-modal').style.display = 'none'; }
        let selectedFmt = 'pdf';
        function setFormat(f) {
            selectedFmt = f;
            document.getElementById('btn-pdf').style.background = f === 'pdf' ? 'var(--primary)' : 'rgba(255,255,255,0.05)';
            document.getElementById('btn-docx').style.background = f === 'docx' ? 'var(--primary)' : 'rgba(255,255,255,0.05)';
        }

        async function generateReport() {
            const btn = document.getElementById('gen-btn');
            btn.innerText = "Processing Portfolio..."; btn.disabled = true;
            try {
                const response = await fetch('/api/report/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ organizerEmail: user.email, type: document.getElementById('report-type').value, startDate: document.getElementById('report-from').value, endDate: document.getElementById('report-to').value, format: selectedFmt })
                });
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `organizer_report.${selectedFmt}`; a.click();
                closeReportModal(); showMessage('Report Downloaded! 📊');
            } catch(e) { showMessage('Error generating report'); }
            finally { btn.innerText = "Generate Portfolio Report"; btn.disabled = false; }
        }

        function showMessage(txt) { const m = document.getElementById('message'); m.innerText = txt; m.style.display = 'block'; m.style.background = 'var(--primary)'; m.style.color = 'white'; setTimeout(()=>m.style.display='none',3000); }
        function logout() { localStorage.removeItem('symboit_user'); window.location.href = '/'; }

        sync();
    </script>
</body>
</html>
