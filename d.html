<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Console | Symboit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: rgba(255,255,255,0.03); --primary: #6366f1; --accent: #10b981; --text: #fff; --text-dim: #94a3b8; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; min-height: 100vh; }
        .glass-header { background: var(--card); backdrop-filter: blur(12px); padding: 1.5rem 2rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .stat-card { background: var(--card); padding: 1.5rem; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .stat-val { font-size: 2.2rem; font-weight: 600; color: var(--primary); }
        .tools-area { background: var(--card); padding: 2rem; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 1.1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; margin-bottom: 1rem; outline: none; font-family: inherit; }
        .btn { width: 100%; padding: 1rem; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; background: var(--primary); color: white; font-family: inherit; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem; background: rgba(255,255,255,0.02); border-radius: 14px; margin-top: 1rem; border: 1px solid rgba(255,255,255,0.05); }
        .status { font-size: 0.65rem; padding: 3px 10px; border-radius: 6px; font-weight: bold; }
        .active { background: rgba(16,185,129,0.1); color: var(--accent); border: 1px solid rgba(16,185,129,0.2); }
        .pending { background: rgba(245,158,11,0.1); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
        .btn-action { background: transparent; border: none; cursor: pointer; opacity: 0.6; transition: 0.3s; color: var(--text-dim); }
        .btn-action:hover { opacity: 1; color: var(--text); }
        #message { position: fixed; top: 2rem; right: 2rem; padding: 1.5rem; border-radius: 14px; display: none; z-index: 1000; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div style="max-width: 900px; margin: 0 auto;">
        <div class="glass-header">
            <div><h1 style="font-size:1.2rem; letter-spacing:2px; font-weight:600;">SYMBOIT <span style="font-weight:300; color:var(--text-dim)">ORGANIZER</span></h1></div>
            <div style="text-align:right;">
                <div id="u-name" style="font-weight:600;">Loading...</div>
                <a href="javascript:logout()" style="color:var(--text-dim); font-size:0.75rem; text-decoration:none;">Sign Out</a>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:2rem;">
            <div class="stat-card"><div class="stat-val" id="m-count">0</div><div style="font-size:0.8rem; color:var(--text-dim)">Mentors</div></div>
            <div class="stat-card" style="background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(16,185,129,0.1));">
                <div style="font-weight:600; color:var(--accent);">ENTERPRISE AI</div>
            </div>
        </div>

        <div class="tools-area">
            <h3 style="margin-bottom:1.5rem; font-weight:400;">Invite New Mentor</h3>
            <input type="email" id="email-input" placeholder="Enter email...">
            <button class="btn" onclick="sendInvite()">Send Invitation</button>

            <div style="margin-top:3rem;">
                <p style="font-size:0.75rem; color:var(--text-dim); font-weight:600; letter-spacing:1.5px; margin-bottom:1.5rem;">MENTOR MANAGEMENT</p>
                <div id="list-container"></div>
            </div>
        </div>
    </div>
    <div id="message"></div>

    <script>
        let user = JSON.parse(localStorage.getItem('symboit_user'));
        if(!user || user.role !== 'organizer') window.location.href = '/';
        document.getElementById('u-name').innerText = user.name;

        async function refresh() {
            const container = document.getElementById('list-container');
            const [uRes, iRes] = await Promise.all([
                fetch(`/api/users?role=mentor&organizerEmail=${user.organizerEmail}`).then(r => r.json()),
                fetch(`/api/invitations?organizerEmail=${user.organizerEmail}`).then(r => r.json())
            ]);
            container.innerHTML = '';
            
            uRes.users.forEach(u => {
                container.innerHTML += `
                    <div class="list-item">
                        <div><div style="font-weight:600;">${u.name}</div><div style="font-size:0.75rem; color:var(--text-dim)">${u.email}</div></div>
                        <div style="display:flex; align-items:center; gap:15px;">
                            <span class="status active">ACTIVE</span>
                            <button class="btn-action" onclick="deleteUser('${u._id}')" style="color:var(--danger)">✕</button>
                        </div>
                    </div>`;
            });

            iRes.invites.filter(i => i.role === 'mentor' && i.status === 'pending').forEach(i => {
                const link = `${window.location.origin}?invite=${i.token}`;
                container.innerHTML += `
                    <div class="list-item" style="border-style:dashed;">
                        <div><div style="font-weight:600;">${i.email}</div><div style="font-size:0.75rem; color:var(--text-dim)">Invitation Pending</div></div>
                        <div style="display:flex; align-items:center; gap:15px;">
                            <button class="btn-action" onclick="copyLink('${link}')" title="Copy Invitation Link">🔗 Copy Link</button>
                            <span class="status pending">PENDING</span>
                            <button class="btn-action" onclick="deleteInvite('${i._id}')" style="color:var(--danger)">✕</button>
                        </div>
                    </div>`;
            });
            document.getElementById('m-count').innerText = uRes.users.length;
        }

        async function sendInvite() {
            const email = document.getElementById('email-input').value;
            if(!email) return;
            const res = await fetch('/api/invite', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, role: 'mentor', inviterEmail: user.email, organizerEmail: user.organizerEmail })
            });
            const data = await res.json();
            if(data.success) {
                showMessage('Invitation Processed Successfully');
                document.getElementById('email-input').value = '';
                refresh();
            } else {
                showMessage(data.error || 'Failed', true);
            }
        }

        function copyLink(link) {
            navigator.clipboard.writeText(link).then(() => {
                alert('Invitation link copied to clipboard! You can now send it manually via WhatsApp or personal email.');
            });
        }

        async function deleteUser(id) { if(confirm('Remove access?')) { await fetch(`/api/users/${id}`, { method: 'DELETE' }); refresh(); } }
        async function deleteInvite(id) { if(confirm('Cancel invite?')) { await fetch(`/api/invitations/${id}`, { method: 'DELETE' }); refresh(); } }
        function showMessage(text, isErr=false) {
            const m = document.getElementById('message');
            m.style.display = 'block'; m.style.background = isErr ? 'rgba(239,68,68,0.9)' : 'rgba(16,185,129,0.9)';
            m.innerText = text; setTimeout(() => m.style.display='none', 5000);
        }
        function logout() { localStorage.removeItem('symboit_user'); window.location.href = '/'; }
        refresh();
    </script>
</body>
</html>
