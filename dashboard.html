<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Dashboard | Symboit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: rgba(255,255,255,0.03); --primary: #6366f1; --accent: #10b981; --danger: #ef4444; --gold: #fbbf24; --text: #fff; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-y: auto; }
        
        .sidebar { width: 320px; background: #080808; border-right: 1px solid rgba(255,255,255,0.05); padding: 2rem; display: flex; flex-direction: column; }
        .main-content { flex: 1; padding: 2rem; overflow-y: auto; }
        
        .glass-card { background: var(--card); backdrop-filter: blur(12px); padding: 1.5rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 1.5rem; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; font-family: inherit; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text-dim); }
        
        .progress-container { width: 100%; height: 14px; background: rgba(255,255,255,0.05); border-radius: 7px; overflow: hidden; margin: 15px 0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: 1s ease; }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .update-feed { flex: 1; overflow-y: auto; margin-top: 2rem; }
        .feed-item { font-size: 0.75rem; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        #message { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 2rem; border-radius: 12px; display: none; z-index: 1000; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #111; padding: 2.5rem; border-radius: 30px; border: 1px solid var(--primary); max-width: 500px; width: 100%; position: relative; }
        .close-btn { position: absolute; top: 1.5rem; right: 1.5rem; color: var(--text-dim); cursor: pointer; font-size: 1.5rem; }

        input[type="date"] { color-scheme: dark; }

        /* Mobile Adjustments */
        .mobile-header { display: none; background: #080808; padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .hamburger { cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
        .hamburger div { width: 25px; height: 2px; background: white; transition: 0.3s; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                position: fixed; left: -320px; top: 0; bottom: 0; z-index: 200; transition: 0.3s; 
                box-shadow: 20px 0 50px rgba(0,0,0,0.5);
            }
            .sidebar.active { left: 0; }
            .mobile-header { display: flex; }
            .main-content { padding: 1rem; }
            .stat-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="mobile-header">
        <h2 style="font-size:1rem; letter-spacing:2px;">SYMBOIT</h2>
        <div class="hamburger" onclick="toggleSidebar()">
            <div></div><div></div><div></div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <h2 style="font-size:1.2rem; letter-spacing:2px; margin-bottom:2rem;">SYMBOIT <span style="font-weight:300; color:var(--text-dim)">MENTOR</span></h2>
        
        <div class="glass-card" style="padding:1rem;">
            <p style="font-size:0.7rem; color:var(--text-dim); margin-bottom:10px;">COMMUNICATION</p>
            <button class="btn btn-primary" onclick="bulkNotify()">📧 Bulk Email Students</button>
            <button class="btn btn-outline" style="border-color:var(--accent); color:var(--accent); margin-top:10px;" onclick="openReportModal()">📊 Generate Reports</button>
        </div>

        <div class="glass-card" style="padding:1rem;">
            <p style="font-size:0.7rem; color:var(--text-dim); margin-bottom:10px;">MANAGEMENT</p>
            <input type="email" id="student-email" placeholder="Student Email" style="width:100%; padding:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:white; font-size:0.8rem; outline:none; margin-bottom:10px;">
            <button class="btn btn-outline" style="margin-top:0; font-size:0.75rem;" onclick="sendInvite('student')">Add Student</button>
        </div>

        <div class="update-feed">
            <p style="font-size:0.7rem; color:var(--gold); font-weight:bold; letter-spacing:1px; margin-bottom:1rem;">LIVE UPDATES</p>
            <div id="feed-container"></div>
        </div>

        <div style="margin-top:auto;">
            <p id="m-email" style="font-size:0.8rem; color:var(--text-dim);"></p>
            <button class="btn btn-outline" style="font-size:0.7rem;" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <div id="report-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeReportModal()">&times;</span>
            <h2 style="font-weight:400; margin-bottom:1.5rem;">Network Report Generation</h2>
            
            <label style="display:block; font-size:0.75rem; color:var(--text-dim); margin-bottom:5px;">REPORT CATEGORY</label>
            <select id="report-type" style="width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:white; margin-bottom:20px; outline:none;">
                <option value="aicte">AICTE Activity Points (All Time)</option>
                <option value="ach">Achievement Node (Range)</option>
                <option value="part">Participation Node (Range)</option>
            </select>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px;">
                <div>
                    <label style="display:block; font-size:0.75rem; color:var(--text-dim); margin-bottom:5px;">FROM DATE</label>
                    <input type="date" id="report-from" style="width:100%; padding:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:white; outline:none;">
                </div>
                <div>
                    <label style="display:block; font-size:0.75rem; color:var(--text-dim); margin-bottom:5px;">TO DATE</label>
                    <input type="date" id="report-to" style="width:100%; padding:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:white; outline:none;">
                </div>
            </div>

            <label style="display:block; font-size:0.75rem; color:var(--text-dim); margin-bottom:5px;">FILE FORMAT</label>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:25px;">
                <button class="btn btn-outline" id="fmt-pdf" onclick="setFormat('pdf')" style="border-color:var(--primary); color:var(--primary); background:rgba(99,102,241,0.1)">PDF Document</button>
                <button class="btn btn-outline" id="fmt-docx" onclick="setFormat('docx')">Word (.docx)</button>
            </div>

            <button class="btn btn-primary" onclick="generateReport()" id="gen-btn">Generate For All Students</button>
            <p style="font-size:0.7rem; color:var(--text-dim); margin-top:15px; text-align:center;">Images will be fetched dynamically from student drives.</p>
        </div>
    </div>

    <div class="main-content">
        <div class="glass-card" style="border-left: 5px solid var(--primary);">
            <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                <h3 style="font-weight:400; letter-spacing:1px;">ORGANIZATION PROGRESS</h3>
                <span id="org-perc" style="color:var(--accent); font-weight:bold;">0%</span>
            </div>
            <div class="progress-container"><div class="progress-bar" id="org-bar" style="width:0%"></div></div>
        </div>

        <div class="stat-grid">
            <div class="glass-card">
                <p style="font-size:0.75rem; color:var(--text-dim)">Network Size</p>
                <h3 id="s-count" style="font-size:2rem;">0</h3>
            </div>
            <div class="glass-card">
                <p style="font-size:0.75rem; color:var(--text-dim)">To Verify</p>
                <h3 id="p-count" style="font-size:2rem; color:var(--gold);">0</h3>
            </div>
        </div>

        <h2 style="margin-bottom:1.5rem; font-weight:300; font-size:1.1rem; letter-spacing:1px; color:var(--text-dim)">STUDENT WORKSPACES</h2>
        <div id="student-list"></div>
    </div>

    <div id="message"></div>

    <script>
        let user = JSON.parse(localStorage.getItem('symboit_user'));
        if(!user || user.role !== 'mentor') window.location.href = '/';
        document.getElementById('m-email').innerText = user.email;

        async function sync() {
            try {
                const [uRes, sRes, aRes, pRes] = await Promise.all([
                    fetch(`/api/users?organizerEmail=${user.organizerEmail}&role=student&mentorEmail=${user.email}`).then(r => r.json()),
                    fetch(`/api/submissions?organizerEmail=${user.organizerEmail}&mentorEmail=${user.email}`).then(r => r.json()),
                    fetch(`/api/achievements?organizerEmail=${user.organizerEmail}&mentorEmail=${user.email}`).then(r => r.json()),
                    fetch(`/api/participations?organizerEmail=${user.organizerEmail}&mentorEmail=${user.email}`).then(r => r.json())
                ]);
                
                const students = uRes.users || [];
                const submissions = sRes.submissions || [];
                const achievements = aRes.achievements || [];
                const participations = pRes.participations || [];

                document.getElementById('s-count').innerText = students.length;
                document.getElementById('p-count').innerText = 
                    submissions.filter(s => s.status === 'pending').length + 
                    achievements.filter(a => a.status === 'pending').length +
                    participations.filter(p => p.status === 'pending').length;

                renderFeed(submissions, achievements, participations);
                renderStudents(students, submissions, achievements, participations);
            } catch (err) { console.error('Sync failed', err); }
        }

        function renderFeed(subs, achs, parts) {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            [...subs, ...achs, ...parts].sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt)).slice(0, 10).forEach(item => {
                const type = item.rank ? 'ACH' : (item.activityTitle ? 'AICTE' : 'PART');
                const color = type === 'AICTE' ? 'var(--primary)' : (type === 'ACH' ? 'var(--gold)' : '#38bdf8');
                container.innerHTML += `
                    <div class="feed-item" style="border-left:2px solid ${color};">
                        <div style="color:var(--text)">${item.studentEmail.split('@')[0]} <span style="font-size:0.5rem; color:${color};">${type}</span></div>
                        <div style="color:var(--text-dim)">${item.title || item.activityTitle || 'Certificate'}</div>
                        <div style="font-size:0.6rem; color:var(--accent); margin-top:4px;">${new Date(item.submittedAt).toLocaleTimeString()}</div>
                    </div>`;
            });
        }

        function renderStudents(students, submissions, achievements, participations) {
            const container = document.getElementById('student-list');
            container.innerHTML = '';
            
            let totalPointsEarned = 0;
            const maxPointsPossible = students.length * 100;

            students.forEach(s => {
                const sSubs = submissions.filter(sub => sub.studentEmail === s.email && sub.status === 'approved');
                const points = sSubs.reduce((acc, curr) => acc + (curr.pointsAwarded || 10), 0);
                
                const sAchs = achievements.filter(a => a.studentEmail === s.email && a.status === 'approved');
                const achPoints = sAchs.reduce((acc, curr) => acc + (curr.pointsAwarded || 10), 0);

                const sParts = participations.filter(p => p.studentEmail === s.email && p.status === 'approved');
                const partPoints = sParts.reduce((acc, curr) => acc + (curr.pointsAwarded || 10), 0);

                totalPointsEarned += (points + achPoints + partPoints);

                const perc = Math.min(100, ((points + achPoints + partPoints) / 100) * 100);
                const pending = submissions.filter(sub => sub.studentEmail === s.email && sub.status === 'pending');
                const pendingAchs = achievements.filter(a => a.studentEmail === s.email && a.status === 'pending');
                const pendingParts = participations.filter(p => p.studentEmail === s.email && p.status === 'pending');
                    
                container.innerHTML += `
                    <div class="glass-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="flex:1;">
                                <h4 style="font-size:1rem;">${s.name || s.email.split('@')[0]}</h4>
                                <p style="font-size:0.75rem; color:var(--text-dim);">${s.email}</p>
                            </div>
                            <div style="display:flex; gap:12px;">
                                <div style="display:flex; gap:8px; margin-right:10px;">
                                    ${s.driveRootFolderId ? `<a href="https://drive.google.com/drive/folders/${s.driveRootFolderId}" target="_blank" title="AICTE Drive" style="color:var(--primary); text-decoration:none; font-size:1.2rem;">📂</a>` : '<span title="No AICTE" style="opacity:0.1; font-size:1.2rem;">📂</span>'}
                                    ${s.achievementFolderId ? `<a href="https://drive.google.com/drive/folders/${s.achievementFolderId}" target="_blank" title="Achievements" style="color:var(--gold); text-decoration:none; font-size:1.2rem;">📂</a>` : '<span title="No ACH" style="opacity:0.1; font-size:1.2rem;">📂</span>'}
                                    ${s.participationFolderId ? `<a href="https://drive.google.com/drive/folders/${s.participationFolderId}" target="_blank" title="Participation" style="color:#38bdf8; text-decoration:none; font-size:1.2rem;">📂</a>` : '<span title="No PART" style="opacity:0.1; font-size:1.2rem;">📂</span>'}
                                </div>
                                <div style="text-align:center;"><div style="font-size:1rem; font-weight:600; color:var(--accent)">${points}</div><div style="font-size:0.45rem; color:var(--text-dim); text-transform:uppercase;">AICTE</div></div>
                                <div style="text-align:center;"><div style="font-size:1rem; font-weight:600; color:var(--gold)">${achPoints}</div><div style="font-size:0.45rem; color:var(--text-dim); text-transform:uppercase;">ACH</div></div>
                                <div style="text-align:center;"><div style="font-size:1rem; font-weight:600; color:#38bdf8">${partPoints}</div><div style="font-size:0.45rem; color:var(--text-dim); text-transform:uppercase;">PART</div></div>
                            </div>
                        </div>
                        <div class="progress-container" style="height:6px; margin-top:15px;"><div class="progress-bar" style="width:${perc}%"></div></div>
                        
                        ${pending.length > 0 ? `
                            <div style="margin-top:15px; background:rgba(99, 102, 241, 0.05); padding:10px; border-radius:12px; border:1px solid rgba(99, 102, 241, 0.1);">
                                <p style="font-size:0.6rem; color:var(--primary); margin-bottom:8px; font-weight:bold; letter-spacing:1px;">AICTE PENDING (${pending.length})</p>
                                ${pending.map(p => `
                                    <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.2); padding:8px; border-radius:8px; margin-bottom:5px;">
                                        <div style="font-size:0.8rem;">${p.activityTitle}</div>
                                        <div style="display:flex; gap:8px;">
                                            <button onclick="verify('${p._id}', 'approved')" style="background:var(--accent); border:none; color:white; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:0.7rem;">Verify</button>
                                            <button onclick="verify('${p._id}', 'rejected')" style="background:var(--danger); border:none; color:white; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:0.7rem;">✕</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>` : ''}

                        ${pendingAchs.length > 0 ? `
                            <div style="margin-top:15px; background:rgba(251, 191, 36, 0.05); padding:10px; border-radius:12px; border:1px solid rgba(251, 191, 36, 0.1);">
                                <p style="font-size:0.6rem; color:var(--gold); margin-bottom:8px; font-weight:bold; letter-spacing:1px;">ACH PENDING (${pendingAchs.length})</p>
                                ${pendingAchs.map(a => `
                                    <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.2); padding:8px; border-radius:8px; margin-bottom:5px;">
                                        <div style="font-size:0.8rem;">${a.title}</div>
                                        <div style="display:flex; gap:8px;">
                                            ${a.files.map((f, idx) => `<a href="https://drive.google.com/uc?id=${f}" target="_blank" style="font-size:0.6rem; color:var(--gold); text-decoration:none; border:1px solid var(--gold); padding:1px 6px; border-radius:4px; text-align:center;">Proof ${idx + 1}</a>`).join('')}
                                            <button onclick="verifyAch('${a._id}', 'approved', '${a.title}')" style="background:var(--accent); border:none; color:white; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:0.7rem;">Verify</button>
                                            <button onclick="verifyAch('${a._id}', 'rejected')" style="background:var(--danger); border:none; color:white; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:0.7rem;">✕</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>` : ''}

                        ${pendingParts.length > 0 ? `
                            <div style="margin-top:15px; background:rgba(56, 189, 248, 0.05); padding:10px; border-radius:12px; border:1px solid rgba(56, 189, 248, 0.1);">
                                <p style="font-size:0.6rem; color:#38bdf8; margin-bottom:8px; font-weight:bold; letter-spacing:1px;">PARTICIPATION PENDING (${pendingParts.length})</p>
                                ${pendingParts.map(p => `
                                    <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.2); padding:8px; border-radius:8px; margin-bottom:5px;">
                                        <div style="font-size:0.8rem;">${p.genre} Certificate</div>
                                        <div style="display:flex; gap:8px;">
                                            ${p.files.map((f, idx) => `<a href="https://drive.google.com/uc?id=${f}" target="_blank" style="font-size:0.6rem; color:#38bdf8; text-decoration:none; border:1px solid #38bdf8; padding:1px 6px; border-radius:4px; text-align:center;">Proof ${idx + 1}</a>`).join('')}
                                            <button onclick="verifyPart('${p._id}', 'approved')" style="background:var(--accent); border:none; color:white; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:0.7rem;">Verify</button>
                                            <button onclick="verifyPart('${p._id}', 'rejected')" style="background:var(--danger); border:none; color:white; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:0.7rem;">✕</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>` : ''}
                    </div>`;
            });

            const orgPerc = maxPointsPossible > 0 ? Math.round((totalPointsEarned / maxPointsPossible) * 100) : 0;
            document.getElementById('org-bar').style.width = orgPerc + '%';
            document.getElementById('org-perc').innerText = orgPerc + '%';
        }

        async function verify(id, status) {
            try {
                const res = await fetch('/api/verify-submission', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, status, points: 10 })
                }).then(r => r.json());
                if(res.success) { showMessage('Updated'); sync(); }
            } catch (e) { showMessage('Failed', true); }
        }

        async function verifyAch(id, status, rank) {
            try {
                const res = await fetch('/api/verify-achievement', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, status, rank })
                }).then(r => r.json());
                if(res.success) { showMessage('Updated'); sync(); }
            } catch (e) { showMessage('Failed', true); }
        }

        async function verifyPart(id, status) {
            try {
                const res = await fetch('/api/verify-participation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, status, points: 10 })
                }).then(r => r.json());
                if(res.success) { showMessage('Updated'); sync(); }
            } catch (e) { showMessage('Failed', true); }
        }

        async function sendInvite(role) {
            const email = document.getElementById('student-email').value;
            if(!email) return showMessage('Enter student email', true);
            
            showMessage('Sending invite...');
            try {
                const res = await fetch('/api/invite', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email, 
                        role: 'student', 
                        inviterEmail: user.email, 
                        organizerEmail: user.organizerEmail 
                    })
                }).then(r => r.json());
                
                if(res.success) {
                    showMessage('Invitation Sent! 📧');
                    document.getElementById('student-email').value = '';
                    sync();
                } else {
                    showMessage(res.error || 'Failed', true);
                }
            } catch (e) { showMessage('Invite failed', true); }
        }

        async function bulkNotify() {
            const msg = prompt("Add a message for your students:", "Please upload your latest progress photos for the monthly update.");
            if (msg === null) return;
            showMessage('Sending emails to all students...');
            try {
                const res = await fetch('/api/bulk-notify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mentorEmail: user.email, organizerEmail: user.organizerEmail, message: msg })
                }).then(r => r.json());
                if(res.success) showMessage(`Emails sent to ${res.count} students! 📧`);
                else showMessage('Failed: ' + res.error, true);
            } catch (e) { showMessage('Failed', true); }
        }

        function showMessage(txt, isError = false) {
            const m = document.getElementById('message');
            m.innerText = txt;
            m.style.display = 'block';
            m.style.background = isError ? 'var(--danger)' : 'var(--accent)';
            m.style.color = 'white';
            setTimeout(() => m.style.display = 'none', 4000);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function logout() { localStorage.removeItem('symboit_user'); window.location.href = '/'; }
        sync();
        // --- REPORTING ---
        let selectedFormat = 'pdf';
        function setFormat(f) {
            selectedFormat = f;
            document.getElementById('fmt-pdf').style.cssText = f === 'pdf' ? 'border-color:var(--primary); color:var(--primary); background:rgba(99,102,241,0.1)' : '';
            document.getElementById('fmt-docx').style.cssText = f === 'docx' ? 'border-color:var(--primary); color:var(--primary); background:rgba(99,102,241,0.1)' : '';
        }

        function openReportModal() {
            document.getElementById('report-modal').style.display = 'flex';
            const now = new Date();
            document.getElementById('report-to').value = now.toISOString().split('T')[0];
            const lastYear = new Date();
            lastYear.setFullYear(now.getFullYear() - 1);
            document.getElementById('report-from').value = lastYear.toISOString().split('T')[0];
        }

        function closeReportModal() { document.getElementById('report-modal').style.display = 'none'; }

        async function generateReport() {
            const btn = document.getElementById('gen-btn');
            const type = document.getElementById('report-type').value;
            const start = document.getElementById('report-from').value;
            const end = document.getElementById('report-to').value;

            btn.innerText = "Processing Network Records...";
            btn.disabled = true;

            try {
                const response = await fetch('/api/report/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mentorEmail: user.email, type, startDate: start, endDate: end, format: selectedFormat })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Generation failed');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `network_report_${type}_${new Date().toISOString().split('T')[0]}.${selectedFormat}`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                showMessage("Report generated successfully!");
                closeReportModal();
            } catch (error) {
                showMessage(error.message, true);
            } finally {
                btn.innerText = "Generate For All Students";
                btn.disabled = false;
            }
        }

        window.onload = function() {
            sync();
        };
    </script>
</body>
</html>
