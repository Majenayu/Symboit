<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mentor Dashboard | Symboit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #030014; 
            --header-bg: rgba(3, 0, 20, 0.7);
            --nav-bg: rgba(3, 0, 20, 0.95);
            --primary: #8b5cf6; 
            --primary-hover: #7c3aed;
            --accent: #10b981; 
            --danger: #ef4444; 
            --gold: #fbbf24; 
            --blue: #38bdf8;
            --text: #f8fafc; 
            --text-dim: #94a3b8; 
            --border: rgba(255, 255, 255, 0.08);
            --card: rgba(255, 255, 255, 0.02);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg); 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.1), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05), transparent 40%);
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Shared Header */
        header { 
            background: var(--header-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        header .app-name { 
            font-size: 1.1rem; 
            font-weight: 600; 
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header .logout-btn { background: transparent; color: var(--danger); border: none; font-size: 0.8rem; font-weight: 600; cursor: pointer; }

        /* Sidebar (Desktop Only) */
        .desktop-sidebar {
            display: none; width: 300px; background: rgba(3, 0, 20, 0.5); border-right: 1px solid var(--border);
            padding: 2rem; flex-direction: column;
        }

        /* Main Content Area */
        #content { flex: 1; overflow-y: auto; position: relative; }
        .tab-content { display: none; padding: 1.5rem; padding-bottom: 120px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Student Card */
        .student-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; }
        .bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; margin-top: 15px; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: 1s ease; }

        /* Bottom Navigation */
        nav { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--nav-bg); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex; 
            justify-content: space-around; 
            padding: 10px 5px; 
            border-top: 1px solid var(--border); 
            z-index: 1000; 
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; color: var(--text-dim); 
            font-size: 0.65rem; font-weight: 600; cursor: pointer; flex: 1; transition: 0.3s;
        }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.5rem; margin-bottom: 2px; }
        
        /* Central Button - EVENTS */
        .fab-wrap { position: relative; width: 70px; height: 40px; }
        .fab { 
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--primary), #ec4899);
            border: 6px solid var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.5);
            cursor: pointer; color: white; transition: 0.2s;
        }
        .fab:active { transform: translateX(-50%) scale(0.9); }
        .fab-icon { font-size: 1.8rem; }
        .fab-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; margin-top: -2px; }

        /* UI Elements */
        .section-title { font-size: 0.75rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; margin-top: 30px; font-weight: 600; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; font-family: inherit; font-size: 0.85rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        input, select { width: 100%; padding: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; color: white; margin-bottom: 15px; font-family: inherit; }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-content { background: #080808; padding: 25px; border-radius: 24px; border: 1px solid var(--primary); width: 100%; max-width: 450px; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: var(--text-dim); }

        @media (min-width: 1024px) {
            body { flex-direction: row; }
            header { position: fixed; top: 0; left: 0; right: 0; }
            .desktop-sidebar { display: flex; padding-top: 80px; }
            #content { padding-top: 80px; }
            nav { display: none; }
        }

        #message { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 12px; z-index: 3000; display: none; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="message"></div>

    <header>
        <div class="app-name">Symboit <span style="font-weight:300; opacity:0.6;">Mentor</span></div>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
    </header>

    <div class="desktop-sidebar">
        <h2 style="font-size:1.1rem; letter-spacing:1px; margin-bottom:1.5rem;">Symboit <span style="font-weight:300;">Mentor</span></h2>
        
        <button class="btn btn-primary" style="margin-bottom:10px; background:rgba(139, 92, 246, 0.1); border:1px solid rgba(139, 92, 246, 0.2); color:var(--primary);" onclick="openReportModal()">📊 Generate Report</button>
        
        <div style="flex:1; overflow-y:auto; margin-top:1.5rem;">
            <p style="font-size:0.65rem; color:var(--text-dim); letter-spacing:1px; margin-bottom:15px;">LIVE FEED</p>
            <div id="d-feed" style="font-size:0.8rem;"></div>
        </div>

        <div style="margin-top:auto; border-top:1px solid var(--border); padding-top:1.5rem;">
            <p id="m-email" style="font-size:0.75rem; color:var(--text-dim); margin-bottom:10px;"></p>
            <button class="btn" style="background:rgba(239, 68, 68, 0.1); color:var(--danger); width:100%;" onclick="logout()">Sign Out</button>
            <button class="btn" style="background:rgba(255,255,255,0.05); color:white; width:100%; margin-top:8px; font-size:0.75rem;" onclick="openReportModal()">📊 Master Report</button>
        </div>
    </div>

    <div id="content">
        <!-- Tab: AICTE (Student List) -->
        <div id="tab-aicte" class="tab-content active">
            <p style="font-size:0.75rem; color:var(--primary); font-weight:600; letter-spacing:2px; margin-bottom:1.5rem;">STUDENT NETWORK (AICTE)</p>
            <div id="student-list"></div>
        </div>

        <!-- Tab: Achievements -->
        <div id="tab-ach" class="tab-content">
            <p style="font-size:0.75rem; color:var(--gold); font-weight:600; letter-spacing:2px; margin-bottom:1.5rem;">ACHIEVEMENT VERIFICATION</p>
            <div id="ach-pending-list"></div>
        </div>

        <!-- Tab: Participations -->
        <div id="tab-part" class="tab-content">
            <p style="font-size:0.75rem; color:var(--blue); font-weight:600; letter-spacing:2px; margin-bottom:1.5rem;">PARTICIPATION VERIFICATION</p>
            <div id="part-pending-list"></div>
        </div>

        <!-- Tab: Manage (Add + Verify AICTE) -->
        <div id="tab-manage" class="tab-content">
            <p style="font-size:0.75rem; color:var(--primary); font-weight:600; letter-spacing:2px; margin-bottom:1.5rem;">MANAGEMENT & VERIFY</p>
            
            <div class="student-card" style="padding:25px;">
                <h4 style="margin-bottom:15px; font-weight:400;">Add Student to Network</h4>
                <input type="email" id="invite-email" placeholder="Student Email Address" style="margin-bottom:12px;">
                <button class="btn-primary" onclick="sendInvite()" style="width:100%; border-radius:12px;">Send Invitation</button>
            </div>

            <div class="section-title">Pending AICTE Submissions</div>
            <div id="aicte-pending-list"></div>
        </div>
    </div>

    <!-- Mobile Navigation -->
    <nav>
        <div class="nav-item active" onclick="switchTab('aicte', this)">
            <div class="nav-icon">📋</div>
            <span>AICTE</span>
        </div>
        <div class="nav-item" onclick="switchTab('ach', this)">
            <div class="nav-icon">🌟</div>
            <span>ACH</span>
        </div>
        <div class="fab-wrap">
            <div class="fab" onclick="switchTab('aicte', document.querySelector('.nav-item'))">
                <div class="fab-icon">📅</div>
                <div class="fab-label">Events</div>
            </div>
        </div>
        <div class="nav-item" onclick="switchTab('part', this)">
            <div class="nav-icon">👥</div>
            <span>PART</span>
        </div>
        <div class="nav-item" onclick="switchTab('manage', this)">
            <div class="nav-icon">🛠️</div>
            <span>VERIFY</span>
        </div>
    </nav>

    <!-- Master Report Modal -->
    <div id="report-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeReportModal()">&times;</span>
            <h2 style="margin-bottom:10px; font-weight:400;">Master Network Report</h2>
            <select id="report-type">
                <option value="aicte">AICTE Portfolio (All-Time)</option>
                <option value="ach">Achievements (Range)</option>
                <option value="part">Participation (Range)</option>
            </select>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                <input type="date" id="report-from" style="margin-bottom:0;">
                <input type="date" id="report-to" style="margin-bottom:0;">
            </div>
            <button class="btn-primary" onclick="generateReport()" style="width:100%;">Generate Report</button>
        </div>
    </div>

    <script>
        let user = JSON.parse(localStorage.getItem('symboit_user'));
        if(!user || user.role !== 'mentor') window.location.href = '/';

        function switchTab(t, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            window.scrollTo(0,0);
        }

        async function sync() {
            try {
                const [uRes, sRes, aRes, pRes] = await Promise.all([
                    fetch(`/api/users?organizerEmail=${user.organizerEmail}&role=student&mentorEmail=${user.email}`).then(r => r.json()),
                    fetch(`/api/submissions?organizerEmail=${user.organizerEmail}&mentorEmail=${user.email}`).then(r => r.json()),
                    fetch(`/api/achievements?organizerEmail=${user.organizerEmail}&mentorEmail=${user.email}`).then(r => r.json()),
                    fetch(`/api/participations?organizerEmail=${user.organizerEmail}&mentorEmail=${user.email}`).then(r => r.json())
                ]);
                
                const students = uRes.users || [];
                const subs = sRes.submissions || [];
                const achs = aRes.achievements || [];
                const parts = pRes.participations || [];

                renderNetwork(students, subs, achs, parts);
                renderPending(subs, achs, parts);
                renderFeed(subs, achs, parts);
            } catch (e) { console.error(e); }
        }

        function renderNetwork(students, subs, achs, parts) {
            const container = document.getElementById('student-list');
            container.innerHTML = students.map(s => {
                const aicte = subs.filter(r => r.studentEmail === s.email && r.status === 'approved').reduce((a,c)=>a+(c.pointsAwarded||10),0);
                const ach = achs.filter(r => r.studentEmail === s.email && r.status === 'approved').reduce((a,c)=>a+(c.pointsAwarded||10),0);
                const part = parts.filter(r => r.studentEmail === s.email && r.status === 'approved').reduce((a,c)=>a+(c.pointsAwarded||10),0);
                const total = aicte + ach + part;
                const perc = Math.min(100, (total / 150) * 100);

                return `<div class="student-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <h4 style="font-size:1rem;">${s.name || s.email.split('@')[0]}</h4>
                            <p style="font-size:0.7rem; color:var(--text-dim);">${s.email}</p>
                        </div>
                        <div style="text-align:right;"><div style="font-size:1.2rem; font-weight:600; color:var(--accent);">${total}</div><div style="font-size:0.5rem; color:var(--text-dim);">PTS</div></div>
                    </div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${perc}%"></div></div>
                    <div style="display:flex; gap:12px; margin-top:12px;">
                        ${s.driveRootFolderId ? `<a href="https://drive.google.com/drive/folders/${s.driveRootFolderId}" target="_blank" style="text-decoration:none; font-size:1.2rem;">📋</a>` : ''}
                        <span style="font-size:0.6rem; color:var(--text-dim); align-self:center;">${aicte} AICTE • ${ach} ACH • ${part} PART</span>
                    </div>
                </div>`;
            }).join('') || '<p style="text-align:center; color:var(--text-dim); margin-top:2rem;">No students found.</p>';
        }

        function renderPending(subs, achs, parts) {
            const aList = document.getElementById('aicte-pending-list');
            const achList = document.getElementById('ach-pending-list');
            const partList = document.getElementById('part-pending-list');

            const renderCard = (p, type) => `
                <div class="student-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:15px;">
                        <div>
                            <h4 style="font-size:0.95rem;">${p.title || p.activityTitle || 'Submission'}</h4>
                            <p style="font-size:0.7rem; color:var(--text-dim);">${p.studentEmail.split('@')[0]}</p>
                        </div>
                        <div style="display:flex; gap:8px;">
                            <button class="btn" style="padding:6px 12px; font-size:0.7rem; background:var(--accent); color:white;" onclick="verify('${p._id}', 'approved', '${type}', '${p.title||''}')">Verify</button>
                            <button class="btn-danger" style="padding:6px 12px; font-size:0.7rem;" onclick="verify('${p._id}', 'rejected', '${type}')">✕</button>
                        </div>
                    </div>
                    ${p.files && p.files.length > 0 ? `<div style="display:flex; gap:8px;">${p.files.map((f, i) => `<a href="https://drive.google.com/uc?id=${f.id || f}" target="_blank" style="font-size:0.6rem; color:var(--primary); text-decoration:none; background:rgba(255,255,255,0.05); padding:4px 8px; border-radius:6px; border:1px solid var(--border);">Proof ${i+1}</a>`).join('')}</div>` : ''}
                </div>`;

            aList.innerHTML = subs.filter(s => s.status === 'pending').map(s => renderCard(s, 'AICTE')).join('') || '<p style="font-size:0.8rem; color:var(--text-dim);">No pending AICTE.</p>';
            achList.innerHTML = achs.filter(a => a.status === 'pending').map(a => renderCard(a, 'ACH')).join('') || '<p style="font-size:0.8rem; color:var(--text-dim);">No pending achievements.</p>';
            partList.innerHTML = parts.filter(p => p.status === 'pending').map(p => renderCard(p, 'PART')).join('') || '<p style="font-size:0.8rem; color:var(--text-dim);">No pending participations.</p>';
        }

        function renderFeed(subs, achs, parts) {
            const feed = [...subs, ...achs, ...parts].sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt)).slice(0, 10);
            const html = feed.map(item => {
                const t = item.rank ? 'ACH' : (item.activityTitle ? 'AICTE' : 'PART');
                return `<div style="padding:10px; border-bottom:1px solid var(--border);">
                    <div style="font-size:0.8rem;"><b>${item.studentEmail.split('@')[0]}</b>: ${item.title || item.activityTitle || 'Proof'}</div>
                    <div style="font-size:0.6rem; color:var(--text-dim); margin-top:2px;">${new Date(item.submittedAt).toLocaleTimeString()} • ${t}</div>
                </div>`;
            }).join('');
            document.getElementById('d-feed').innerHTML = html;
        }

        async function verify(id, status, type, title) {
            const url = type === 'AICTE' ? '/api/verify-submission' : (type === 'ACH' ? '/api/verify-achievement' : '/api/verify-participation');
            try {
                await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, status, rank: title, points: 10 }) });
                sync(); showMessage('Status Updated!');
            } catch (e) { showMessage('Failed', true); }
        }

        async function sendInvite() {
            const email = document.getElementById('invite-email').value;
            if(!email) return;
            await fetch('/api/invite', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, role: 'student', inviterEmail: user.email, organizerEmail: user.organizerEmail }) });
            document.getElementById('invite-email').value = '';
            sync(); showMessage('Invitation Sent! 📧');
        }

        function openReportModal() { document.getElementById('report-modal').style.display = 'flex'; }
        function closeReportModal() { document.getElementById('report-modal').style.display = 'none'; }

        async function generateReport() {
            const type = document.getElementById('report-type').value;
            const from = document.getElementById('report-from').value;
            const to = document.getElementById('report-to').value;
            showMessage('Generating...');
            const res = await fetch('/api/report/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mentorEmail: user.email, type, startDate: from, endDate: to, format: 'pdf' }) });
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `mentor_report.pdf`; a.click();
            closeReportModal(); showMessage('Downloaded!');
        }

        function showMessage(txt, isError = false) {
            const m = document.getElementById('message');
            m.innerText = txt; m.style.display = 'block'; m.style.background = isError ? 'var(--danger)' : 'var(--primary)';
            setTimeout(() => m.style.display = 'none', 3000);
        }

        function logout() { localStorage.removeItem('symboit_user'); window.location.href = '/'; }
        sync();
    </script>
</body>
</html>
