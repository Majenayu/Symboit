<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mentor Dashboard | Symboit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #030014; 
            --header-bg: rgba(3, 0, 20, 0.7);
            --nav-bg: rgba(3, 0, 20, 0.95);
            --primary: #8b5cf6; 
            --primary-hover: #7c3aed;
            --accent: #10b981; 
            --danger: #ef4444; 
            --gold: #fbbf24; 
            --blue: #38bdf8;
            --text: #f8fafc; 
            --text-dim: #94a3b8; 
            --border: rgba(255, 255, 255, 0.08);
            --card: rgba(255, 255, 255, 0.02);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg); 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.1), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05), transparent 40%);
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Shared Header */
        header { 
            background: var(--header-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        header .app-name { 
            font-size: 1.15rem; 
            font-weight: 600; 
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header .header-actions { display: flex; align-items: center; gap: 12px; }
        .report-pill { background: rgba(139, 92, 246, 0.15); border: 1px solid rgba(139, 92, 246, 0.3); color: var(--primary); padding: 6px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; cursor: pointer; }

        /* Main Content Area */
        #content { flex: 1; overflow-y: auto; position: relative; }
        .tab-content { display: none; padding: 1.5rem; padding-bottom: 120px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Progress Card */
        .progress-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 25px; }
        .bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; margin-top: 15px; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: 1s ease; }

        /* Student Card */
        .student-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.05); }

        /* Bottom Navigation */
        nav { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--nav-bg); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex; 
            justify-content: space-around; 
            padding: 10px 5px; 
            border-top: 1px solid var(--border); 
            z-index: 1000; 
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; color: var(--text-dim); 
            font-size: 0.65rem; font-weight: 600; cursor: pointer; flex: 1; transition: 0.3s;
        }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.5rem; margin-bottom: 2px; }
        
        /* Central Button - EVENTS */
        .fab-wrap { position: relative; width: 70px; height: 40px; }
        .fab { 
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--primary), #ec4899);
            border: 6px solid var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.5);
            cursor: pointer; color: white; transition: 0.2s;
        }
        .fab:active { transform: translateX(-50%) scale(0.9); }
        .fab-icon { font-size: 1.8rem; }
        .fab-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; margin-top: -2px; }

        /* UI Elements */
        .section-title { font-size: 0.75rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; margin-top: 30px; font-weight: 600; }
        .btn { padding: 10px 15px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; font-family: inherit; font-size: 0.8rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        input { width: 100%; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; color: white; margin-bottom: 12px; font-family: inherit; }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-content { background: #080808; padding: 25px; border-radius: 24px; border: 1px solid var(--primary); width: 100%; max-width: 450px; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: var(--text-dim); }

        #message { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 12px; z-index: 3000; display: none; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* LOADER */
        .loader-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="message"></div>
    <div id="loader" class="loader-overlay"><div class="spinner"></div><div style="color:white; font-weight:600; letter-spacing:1px;">GENERATING REPORT...</div></div>

    <header>
        <div class="app-name">Symboit <span style="font-weight:300; opacity:0.6;">Mentor</span></div>
        <div class="header-actions">
            <div class="report-pill" onclick="openReportModal()">📊 REPORTS</div>
            <div onclick="logout()" style="color:var(--danger); font-weight:600; font-size:0.8rem; cursor:pointer;">LOGOUT</div>
        </div>
    </header>

    <div id="content">
        <!-- Tab 1: AICTE (ONLY AICTE) -->
        <div id="tab-aicte" class="tab-content active">
            <div class="progress-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                    <div><h2 style="font-weight:400; font-size:1.4rem;">Mentor Progress</h2><p style="color:var(--text-dim); font-size:0.75rem; margin-top:5px;">Overall network completion</p></div>
                    <div style="text-align:right;"><span id="m-perc" style="font-size:1.8rem; font-weight:600; color:var(--accent);">0%</span></div>
                </div>
                <div class="bar-bg"><div class="bar-fill" id="m-bar" style="width:0%"></div></div>
            </div>

            <p style="font-size:0.7rem; color:var(--primary); font-weight:600; letter-spacing:2px; margin-bottom:15px;">PENDING AICTE APPROVALS</p>
            <div id="aicte-pending-list"></div>

            <p style="font-size:0.7rem; color:var(--primary); font-weight:600; letter-spacing:2px; margin:25px 0 15px 0;">STUDENT AICTE POINTS</p>
            <div id="aicte-student-list"></div>
        </div>

        <!-- Tab 2: Portfolio (Same style as d.html) -->
        <div id="tab-portfolio" class="tab-content">
            <p style="font-size:0.7rem; letter-spacing:2px; color:var(--primary); margin-bottom:1.5rem; font-weight:600;">PORTFOLIO NETWORK</p>
            <div id="portfolio-list"></div>

            <p style="font-size:0.7rem; color:var(--gold); font-weight:600; letter-spacing:2px; margin:25px 0 15px 0;">PORTFOLIO VERIFICATION</p>
            <div id="portfolio-pending-list"></div>
        </div>

        <!-- Tab 4: Network (Add Student + Status) -->
        <div id="tab-network" class="tab-content">
            <div class="student-card" style="padding:25px;">
                <h4 style="margin-bottom:15px; font-weight:400;">Add Student</h4>
                <input type="email" id="invite-email" placeholder="Student Email Address">
                <button class="btn-primary" onclick="sendInvite()" style="width:100%; border-radius:10px;">Send Invitation</button>
            </div>

            <p style="font-size:0.7rem; color:var(--primary); font-weight:600; letter-spacing:2px; margin-bottom:15px;">INVITATION STATUS</p>
            <div id="invite-status-list"></div>
        </div>

        <!-- Tab 5: Feed -->
        <div id="tab-feed" class="tab-content">
            <p style="font-size:0.7rem; color:var(--primary); font-weight:600; letter-spacing:2px; margin-bottom:15px;">MY FEED</p>
            <div id="live-feed-list"></div>
        </div>
    </div>

    <!-- Mobile Navigation -->
    <nav>
        <div class="nav-item active" onclick="switchTab('aicte', this)">
            <div class="nav-icon">📋</div>
            <span>AICTE</span>
        </div>
        <div class="nav-item" onclick="switchTab('portfolio', this)">
            <div class="nav-icon">🌟</div>
            <span>PORTFOLIO</span>
        </div>
        <div class="fab-wrap">
            <div class="fab" onclick="switchTab('aicte', document.querySelector('.nav-item'))">
                <div class="fab-icon">📅</div>
                <div class="fab-label">Events</div>
            </div>
        </div>
        <div class="nav-item" onclick="switchTab('network', this)">
            <div class="nav-icon">➕</div>
            <span>NETWORK</span>
        </div>
        <div class="nav-item" onclick="switchTab('feed', this)">
            <div class="nav-icon">🔔</div>
            <span>FEED</span>
        </div>
    </nav>

    <div id="report-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeReportModal()">&times;</span>
            <h2 style="margin-bottom:10px; font-weight:400;">Network Reports</h2>
            <select id="report-type" style="width:100%; padding:12px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; color:white; margin-bottom:15px;">
                <option value="aicte">AICTE Portfolio (All-Time)</option>
                <option value="ach">Achievements (Range)</option>
                <option value="part">Participation (Range)</option>
            </select>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                <input type="date" id="report-from" style="margin-bottom:0;">
                <input type="date" id="report-to" style="margin-bottom:0;">
            </div>
            <button class="btn-primary" onclick="generateReport()" style="width:100%; padding:14px; border-radius:12px; font-weight:600;">Download Master Report</button>
        </div>
    </div>

    <script>
        let user = JSON.parse(localStorage.getItem('symboit_user'));
        if(!user || user.role !== 'mentor') window.location.href = '/';

        function switchTab(t, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            window.scrollTo(0,0);
        }

        async function sync() {
            try {
                const [uRes, sRes, aRes, pRes, iRes] = await Promise.all([
                    fetch(`/api/users?organizerEmail=${user.organizerEmail}&role=student&mentorEmail=${user.email}`).then(r => r.json()),
                    fetch(`/api/submissions?organizerEmail=${user.organizerEmail}&mentorEmail=${user.email}`).then(r => r.json()),
                    fetch(`/api/achievements?organizerEmail=${user.organizerEmail}&mentorEmail=${user.email}`).then(r => r.json()),
                    fetch(`/api/participations?organizerEmail=${user.organizerEmail}&mentorEmail=${user.email}`).then(r => r.json()),
                    fetch(`/api/invitations?organizerEmail=${user.organizerEmail}&inviterEmail=${user.email}`).then(r => r.json())
                ]);
                
                const students = uRes.users || [];
                const subs = sRes.submissions || [];
                const achs = aRes.achievements || [];
                const parts = pRes.participations || [];
                const invites = iRes.invites || [];

                renderAICTE(students, subs);
                renderPortfolio(students, achs, parts);
                renderNetwork(invites);
                renderFeed(subs, achs, parts);

                // Mentor Progress
                const totalEarned = [...subs, ...achs, ...parts].filter(i => i.status === 'approved').reduce((a,c)=>a+(c.pointsAwarded||10),0);
                const totalPossible = students.length * 150; 
                const perc = totalPossible > 0 ? Math.round((totalEarned / totalPossible) * 100) : 0;
                document.getElementById('m-perc').innerText = perc + '%';
                document.getElementById('m-bar').style.width = perc + '%';
            } catch (e) { console.error(e); }
        }

        function renderAICTE(students, subs) {
            const pList = document.getElementById('aicte-pending-list');
            pList.innerHTML = subs.filter(s => s.status === 'pending').map(p => `
                <div class="student-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div><h4 style="font-size:0.9rem;">${p.activityTitle}</h4><p style="font-size:0.65rem; color:var(--text-dim);">${p.studentEmail.split('@')[0]}</p></div>
                        <div style="display:flex; gap:8px;">
                            <button class="btn" style="background:var(--accent); color:white; padding:5px 10px; font-size:0.65rem;" onclick="verify('${p._id}', 'approved', 'AICTE', '${p.activityTitle}')">Verify</button>
                            <button class="btn-danger" style="padding:5px 10px; font-size:0.65rem;" onclick="verify('${p._id}', 'rejected', 'AICTE')">✕</button>
                        </div>
                    </div>
                </div>`).join('') || '<p style="font-size:0.75rem; color:var(--text-dim);">No pending AICTE.</p>';

            const sList = document.getElementById('aicte-student-list');
            sList.innerHTML = students.map(s => {
                const pts = subs.filter(r => r.studentEmail === s.email && r.status === 'approved').reduce((a,c)=>a+(c.pointsAwarded||10),0);
                const perc = Math.min(100, (pts / 100) * 100);
                return `<div class="student-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div><h4 style="font-size:0.9rem;">${s.name || s.email.split('@')[0]}</h4></div>
                        <div style="font-size:1.1rem; font-weight:600; color:var(--primary);">${pts} <span style="font-size:0.5rem; color:var(--text-dim);">PTS</span></div>
                    </div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${perc}%; background:var(--primary);"></div></div>
                </div>`;
            }).join('');
        }

        function renderPortfolio(students, achs, parts) {
            // Pending Verification (Verification Section)
            const pList = document.getElementById('portfolio-pending-list');
            const allPending = [
                ...achs.filter(a => a.status === 'pending').map(a => ({...a, type: 'ACH'})),
                ...parts.filter(p => p.status === 'pending').map(p => ({...p, type: 'PART'}))
            ].sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt));

            pList.innerHTML = allPending.map(p => `
                <div class="student-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
                        <div><p style="font-size:0.55rem; color:${p.type==='ACH'?'var(--gold)':'var(--blue)'}; font-weight:700;">${p.type}</p><h4 style="font-size:0.9rem;">${p.title || p.genre}</h4><p style="font-size:0.65rem; color:var(--text-dim);">${p.studentEmail.split('@')[0]}</p></div>
                        <div style="display:flex; gap:8px;">
                            <button class="btn" style="background:var(--accent); color:white; padding:5px 10px; font-size:0.65rem;" onclick="verify('${p._id}', 'approved', '${p.type}', '${p.title||p.genre}')">Verify</button>
                            <button class="btn-danger" style="padding:5px 10px; font-size:0.65rem;" onclick="verify('${p._id}', 'rejected', '${p.type}')">✕</button>
                        </div>
                    </div>
                    <div style="display:flex; gap:8px;">${(p.files||[]).map((f,i) => `<a href="https://drive.google.com/uc?id=${f.id || f}" target="_blank" style="font-size:0.6rem; color:var(--text-dim); text-decoration:none; background:rgba(255,255,255,0.05); padding:4px 8px; border-radius:6px;">Proof ${i+1}</a>`).join('')}</div>
                </div>`).join('') || '<p style="font-size:0.75rem; color:var(--text-dim);">No pending portfolio items.</p>';

            // Portfolio Network (The d.html style card)
            const pNetwork = document.getElementById('portfolio-list');
            pNetwork.innerHTML = `
                <div class="student-card" style="padding:1.5rem; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); border-radius:24px;">
                    <div style="font-weight:600; font-size:1.1rem; margin-bottom:1.5rem; color:var(--text);">${user.name || user.email.split('@')[0]}</div>
                    
                    <p style="font-size:0.65rem; color:var(--gold); font-weight:600; margin-bottom:12px; letter-spacing:1px; text-transform:uppercase;">ACHIEVEMENTS</p>
                    ${students.map(s => {
                        const pts = achs.filter(r => r.studentEmail === s.email && r.status === 'approved').reduce((a,c)=>a+(c.pointsAwarded||10),0);
                        const fid = s.achievementFolderId;
                        return `<div class="student-row">
                            <div style="font-size:0.95rem; font-weight:400;">${s.name || s.email.split('@')[0]}</div>
                            <div style="display:flex; align-items:center; gap:15px;">
                                <div style="font-size:0.85rem; font-weight:600; color:var(--gold);">${pts} PTS</div>
                                <a href="${fid ? 'https://drive.google.com/drive/folders/' + fid : 'javascript:void(0)'}" ${fid ? 'target="_blank"' : ''} style="text-decoration:none; opacity:${fid?1:0.1}; font-size:1.4rem; color:var(--gold);">📂</a>
                            </div>
                        </div>`;
                    }).join('')}

                    <p style="font-size:0.65rem; color:var(--blue); font-weight:600; margin:25px 0 12px 0; letter-spacing:1px; text-transform:uppercase;">PARTICIPATIONS</p>
                    ${students.map(s => {
                        const pts = parts.filter(r => r.studentEmail === s.email && r.status === 'approved').reduce((a,c)=>a+(c.pointsAwarded||10),0);
                        const fid = s.participationFolderId;
                        return `<div class="student-row">
                            <div style="font-size:0.95rem; font-weight:400;">${s.name || s.email.split('@')[0]}</div>
                            <div style="display:flex; align-items:center; gap:15px;">
                                <div style="font-size:0.85rem; font-weight:600; color:var(--blue);">${pts} PTS</div>
                                <a href="${fid ? 'https://drive.google.com/drive/folders/' + fid : 'javascript:void(0)'}" ${fid ? 'target="_blank"' : ''} style="text-decoration:none; opacity:${fid?1:0.1}; font-size:1.4rem; color:var(--blue);">📂</a>
                            </div>
                        </div>`;
                    }).join('')}
                </div>`;
        }

        function renderNetwork(invites) {
            const list = document.getElementById('invite-status-list');
            list.innerHTML = invites.filter(i => i.status === 'pending').map(i => `
                <div class="student-card" style="border:1px dashed var(--gold); background:transparent;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div><div style="font-size:0.85rem; color:var(--text-dim);">${i.email}</div><div style="font-size:0.55rem; color:var(--gold);">PENDING</div></div>
                        <button class="btn-danger" style="padding:4px 8px; font-size:0.6rem;" onclick="deleteInvite('${i._id}')">Cancel</button>
                    </div>
                </div>`).join('') || '<p style="font-size:0.75rem; color:var(--text-dim);">No pending invitations.</p>';
        }

        function renderFeed(subs, achs, parts) {
            const feed = [...subs, ...achs, ...parts].sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt)).slice(0, 15);
            document.getElementById('live-feed-list').innerHTML = feed.map(item => {
                const t = item.rank ? 'ACH' : (item.activityTitle ? 'AICTE' : 'PART');
                return `<div style="padding:12px; border-bottom:1px solid var(--border);">
                    <div style="font-size:0.85rem;"><b>${item.studentEmail.split('@')[0]}</b>: ${item.title || item.activityTitle || 'Proof'}</div>
                    <div style="font-size:0.65rem; color:var(--text-dim); margin-top:4px;">${new Date(item.submittedAt).toLocaleTimeString()} • ${t}</div>
                </div>`;
            }).join('');
        }

        async function verify(id, status, type, title) {
            const url = type === 'AICTE' ? '/api/verify-submission' : (type === 'ACH' ? '/api/verify-achievement' : '/api/verify-participation');
            await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, status, rank: title, points: 10 }) });
            sync(); showMessage('Status Updated!');
        }

        async function sendInvite() {
            const email = document.getElementById('invite-email').value;
            if(!email) return;
            await fetch('/api/invite', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, role: 'student', inviterEmail: user.email, organizerEmail: user.organizerEmail }) });
            document.getElementById('invite-email').value = '';
            sync(); showMessage('Invitation Sent! 📧');
        }

        async function deleteInvite(id) { if(confirm('Cancel invite?')) { await fetch(`/api/invitations/${id}`, { method: 'DELETE' }); sync(); } }
        function openReportModal() { document.getElementById('report-modal').style.display = 'flex'; }
        function closeReportModal() { document.getElementById('report-modal').style.display = 'none'; }

        async function generateReport() {
            const type = document.getElementById('report-type').value;
            const from = document.getElementById('report-from').value;
            const to = document.getElementById('report-to').value;
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            
            try {
                const res = await fetch('/api/report/generate', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ mentorEmail: user.email, type, startDate: from, endDate: to, format: 'pdf' }) 
                });
                if(!res.ok) throw new Error('Failed');
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); 
                a.href = url; 
                a.download = `mentor_report_${user.email.split('@')[0]}.pdf`; 
                document.body.appendChild(a);
                a.click(); 
                a.remove();
                window.URL.revokeObjectURL(url);
                closeReportModal(); 
                showMessage('Report Downloaded! 📄');
            } catch (e) {
                console.error(e);
                alert('Report generation failed.');
            } finally {
                loader.style.display = 'none';
            }
        }

        function showMessage(txt) {
            const m = document.getElementById('message');
            m.innerText = txt; m.style.display = 'block'; m.style.background = 'var(--primary)';
            setTimeout(() => m.style.display = 'none', 3000);
        }

        function logout() { localStorage.removeItem('symboit_user'); window.location.href = '/'; }
        sync();
    </script>
</body>
</html>
