<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Workspace | Symboit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: rgba(255,255,255,0.03); --primary: #6366f1; --accent: #10b981; --text: #fff; --text-dim: #94a3b8; --gold: #fbbf24; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; min-height: 100vh; }
        .glass-header { background: var(--card); backdrop-filter: blur(12px); padding: 1.5rem 2rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .progress-section { background: var(--card); padding: 2rem; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 2rem; }
        .bar-bg { width: 100%; height: 12px; background: rgba(255,255,255,0.05); border-radius: 6px; margin: 15px 0; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: 1s ease; }
        
        .section-title { margin-bottom: 1.5rem; font-weight: 300; letter-spacing: 1.5px; color: var(--text-dim); text-transform: uppercase; font-size: 0.8rem; border-left: 3px solid var(--primary); padding-left: 10px; }
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; margin-bottom: 3rem; }
        .activity-card { background: var(--card); padding: 1.5rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; position: relative; }
        .activity-card:hover { border-color: var(--primary); transform: translateY(-5px); background: rgba(255,255,255,0.05); }
        .activity-card.approved { border-color: var(--accent); background: rgba(16, 185, 129, 0.05); }
        .activity-card.approved::after { content: '✓ VERIFIED'; position: absolute; inset: 0; background: rgba(16, 185, 129, 0.85); color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.2rem; border-radius: 20px; z-index: 10; letter-spacing: 2px; }
        
        .badge { font-size: 0.65rem; font-weight: bold; background: rgba(99, 102, 241, 0.1); color: var(--primary); padding: 4px 10px; border-radius: 6px; position: absolute; top: 1.5rem; right: 1.5rem; }
        .milestone-pill { font-size: 0.6rem; padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.05); color: var(--text-dim); margin-right: 5px; }
        .milestone-pill.done { background: var(--accent); color: white; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #111; padding: 2.5rem; border-radius: 30px; border: 1px solid var(--primary); max-width: 600px; width: 100%; position: relative; }
        .close-btn { position: absolute; top: 1.5rem; right: 1.5rem; color: var(--text-dim); cursor: pointer; font-size: 1.5rem; }
        
        .milestone-box { padding: 1rem; border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .milestone-box:hover { border-color: var(--primary); background: rgba(255,255,255,0.02); }
        .milestone-box.selected { border-color: var(--accent); background: rgba(16, 185, 129, 0.05); }
    </style>
</head>
<body>
    <div style="max-width: 1200px; margin: 0 auto;">
        <div class="glass-header">
            <div><h1 style="font-size:1.2rem; letter-spacing:2px; font-weight:600;">SYMBOIT <span style="font-weight:300; color:var(--text-dim)">STUDENT</span></h1></div>
            <div style="text-align:right;">
                <div id="u-name" style="font-weight:600;">Loading...</div>
                <a href="javascript:logout()" style="color:var(--text-dim); font-size:0.75rem; text-decoration:none; opacity:0.7;">Sign Out</a>
            </div>
        </div>

        <div class="progress-section">
            <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                <div>
                    <h2 style="font-weight:400; font-size:1.5rem;">AICTE Activity Points</h2>
                    <p style="color:var(--text-dim); font-size:0.8rem; margin-top:5px;">Mandatory for Bachelor's Degree completion</p>
                </div>
                <div style="text-align:right;">
                    <span id="p-val" style="font-size:2rem; font-weight:600; color:var(--accent);">0</span>
                    <span style="color:var(--text-dim);"> / <span id="p-max">100</span> pts</span>
                </div>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="p-bar"></div></div>
            <div style="display:flex; gap:20px; margin-top:10px;">
                <div style="font-size:0.8rem; color:var(--text-dim); display:flex; gap:15px;">
                    <span>📅 Day College: <b>100</b></span>
                    <span>📍 Lateral (3yr): <b>75</b></span>
                    <span>🎓 Lateral (2yr): <b>50</b></span>
                </div>
            </div>
            </div>
        </div>

        <div class="section-title">Priority Rubrics (One-Day Events)</div>
        <div class="activity-grid" id="rubric-grid"></div>

        <div class="section-title">AICTE Activity Heads (2-Week Milestones)</div>
        <div class="activity-grid" id="activity-grid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">✕</span>
            <h2 id="m-title" style="margin-bottom:5px;">Activity Detail</h2>
            <p id="m-type" style="font-size:0.7rem; color:var(--gold); margin-bottom:15px; text-transform:uppercase;"></p>
            <p id="m-desc" style="color:var(--text-dim); line-height:1.6; margin-bottom:2rem; font-size:0.9rem;"></p>
            
            <div id="milestone-selector" style="margin-bottom:20px;"></div>

            <div id="upload-area" style="background:rgba(255,255,255,0.03); padding:1.5rem; border-radius:15px; border:1px solid rgba(255,255,255,0.1); display:none;">
                <h4 style="font-size:0.8rem; color:var(--primary); margin-bottom:1rem; letter-spacing:1px;">UPLOAD GEOTAGGED PHOTOS</h4>
                
                <div style="margin-bottom:20px;">
                    <label style="font-size:0.7rem; color:var(--text-dim); display:block; margin-bottom:8px;">ACTIVITY DATE</label>
                    <input type="date" id="event-date" style="width:100%; padding:10px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:white;">
                </div>

                <div id="preview-container" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap:10px; margin-bottom:15px;"></div>
                <input type="file" multiple id="file-input" accept="image/*" onchange="previewImages()" style="width:100%; padding:1rem; background:rgba(0,0,0,0.2); border:1px dashed rgba(255,255,255,0.2); border-radius:10px; color:white;">
                <button class="btn" id="submit-btn" style="margin-top:1.5rem; width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="handleSubmit()">Upload to Drive</button>
            </div>
        </div>
    </div>

    <script>
        let activities = [];
        let rubrics = [];

        let user = JSON.parse(localStorage.getItem('symboit_user'));
        if(!user || user.role !== 'student') window.location.href = '/';
        document.getElementById('u-name').innerText = user.name;

        let submissions = [];
        let currentActivity = null;
        let selectedMilestone = null;

        async function render() {
            try {
                // Fetch institutional genres first
                const gRes = await fetch(`/api/genres?organizerEmail=${user.organizerEmail}`).then(r => r.json());
                const allGenres = gRes.genres || [];
                rubrics = allGenres.filter(g => g.isRubric);
                activities = allGenres.filter(g => !g.isRubric);

                // Fetch student submissions
                const res = await fetch(`/api/submissions?studentEmail=${user.email}&organizerEmail=${user.organizerEmail}`);
                const data = await res.json();
                submissions = data.submissions || [];
            } catch (e) { console.error(e); }

            const rGrid = document.getElementById('rubric-grid');
            const aGrid = document.getElementById('activity-grid');
            rGrid.innerHTML = ''; aGrid.innerHTML = '';

            let totalPoints = 0;
            let currentYearPoints = 0;
            const currentYear = new Date().getFullYear();

            // Calculate current year points specifically for the cap
            submissions.forEach(s => {
                if(s.status === 'approved') {
                    const sYear = new Date(s.eventDate || s.submittedAt).getFullYear();
                    if(sYear === currentYear) {
                        currentYearPoints += (s.pointsAwarded || 10);
                    }
                }
            });

            // Final points calculation with 30pt yearly cap
            // Note: Total points = Sum of (Yearly Points Capped at 30)
            // Simplified for now: Total points = Min(30, currentYearApproved)
            totalPoints = Math.min(30, currentYearPoints);

            rubrics.forEach(r => {
                const s = submissions.find(x => x.activityTitle === r.title);
                const approved = s && s.status === 'approved';
                
                rGrid.innerHTML += `
                    <div class="activity-card ${approved ? 'approved' : ''}" onclick="openModal('${r._id}', true)">
                        <span class="badge">+${r.pts} PTS</span>
                        <h4 style="margin-bottom:10px; font-size:0.9rem;">${r.title}</h4>
                        <div style="display:flex; align-items:center;">
                            <span class="milestone-pill ${s ? 'done' : ''}">${s ? 'SUBMITTED' : 'ONE-DAY'}</span>
                        </div>
                    </div>`;
            });

            activities.forEach(a => {
                const w1 = submissions.find(x => x.activityTitle === a.title && x.milestone === 'Week 1' && x.status === 'approved');
                const w2 = submissions.find(x => x.activityTitle === a.title && x.milestone === 'Week 2' && x.status === 'approved');
                
                let cleared = 0;
                if(w1) cleared++;
                if(w2) cleared++;

                aGrid.innerHTML += `
                    <div class="activity-card ${cleared === 2 ? 'approved' : ''}" onclick="openModal('${a._id}', false)">
                        <span class="badge">+${a.pts} PTS</span>
                        <h4 style="margin-bottom:10px; font-size:0.9rem;">${a.title}</h4>
                        <div style="display:flex; align-items:center; justify-content:space-between;">
                            <div style="display:flex; gap:5px;">
                                <span class="milestone-pill ${w1 ? 'done' : ''}">W1</span>
                                <span class="milestone-pill ${w2 ? 'done' : ''}">W2</span>
                            </div>
                            <span style="font-size:0.6rem; color:var(--accent);">${cleared}/2 Cleared</span>
                        </div>
                    </div>`;
            });

            // Update Progress Bar
            document.getElementById('p-val').innerText = totalPoints;
            if(currentYearPoints > 30) {
                document.getElementById('p-val').innerHTML += ` <span style="font-size:0.7rem; color:var(--gold);">(Cap Reached: ${currentYearPoints} Earned)</span>`;
            }
            const max = parseInt(document.getElementById('p-max').innerText);
            document.getElementById('p-bar').style.width = Math.min(100, (totalPoints / max) * 100) + '%';
        }

        function openModal(id, isRubric) {
            const list = isRubric ? rubrics : activities;
            currentActivity = list.find(x => x._id === id);
            
            document.getElementById('m-title').innerText = currentActivity.title;
            document.getElementById('m-type').innerText = currentActivity.type === 'weeks' ? '2-Week Project' : 'Single Event';
            document.getElementById('m-desc').innerText = currentActivity.desc;
            document.getElementById('modal').style.display = 'flex';
            
            const selector = document.getElementById('milestone-selector');
            selector.innerHTML = '';
            document.getElementById('upload-area').style.display = 'none';

            if(currentActivity.type === 'weeks') {
                ['Week 1', 'Week 2'].forEach(m => {
                    const done = submissions.some(s => s.activityTitle === currentActivity.title && s.milestone === m);
                    selector.innerHTML += `<div class="milestone-box ${done ? 'selected' : ''}" onclick="selectMilestone('${m}', ${done})">
                        <b>${m}</b> ${done ? '— Evidence Uploaded ✓' : '— Needs Proof'}
                    </div>`;
                });
            } else {
                const done = submissions.some(s => s.activityTitle === currentActivity.title);
                selector.innerHTML += `<div class="milestone-box ${done ? 'selected' : ''}" onclick="selectMilestone('Full', ${done})">
                    <b>Event Evidence</b> ${done ? '— Evidence Uploaded ✓' : '— Needs Proof'}
                </div>`;
            }
        }

        function selectMilestone(m, done) {
            if(done) return alert('This milestone is already submitted.');
            selectedMilestone = m;
            document.querySelectorAll('.milestone-box').forEach(b => b.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            document.getElementById('upload-area').style.display = 'block';
            document.getElementById('preview-container').innerHTML = '';
            document.getElementById('file-input').value = '';
        }

        function previewImages() {
            const container = document.getElementById('preview-container');
            container.innerHTML = '';
            const files = document.getElementById('file-input').files;
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.style.width = '100%'; img.style.height = '60px'; img.style.objectFit = 'cover'; img.style.borderRadius = '8px';
                    container.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        async function handleSubmit() {
            const fileInput = document.getElementById('file-input');
            const dateInput = document.getElementById('event-date');
            if(!dateInput.value) return alert('Please select the activity date.');
            if(fileInput.files.length === 0) return alert('Select photos.');
            
            const btn = document.getElementById('submit-btn');
            btn.innerText = 'Uploading to Drive...'; btn.disabled = true;

            const formData = new FormData();
            formData.append('studentEmail', user.email);
            formData.append('organizerEmail', user.organizerEmail);
            formData.append('activityTitle', currentActivity.title);
            formData.append('milestone', selectedMilestone);
            formData.append('eventDate', dateInput.value);
            Array.from(fileInput.files).forEach(file => formData.append('files', file));

            try {
                const res = await fetch('/api/submit-activity', { method: 'POST', body: formData }).then(r => r.json());
                if(res.success) {
                    alert('Milestone Proof Uploaded!');
                    closeModal();
                    render();
                } else alert(res.error);
            } catch (err) { alert('Upload failed'); }
            finally { btn.innerText = 'Upload to Drive'; btn.disabled = false; }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function logout() { localStorage.removeItem('symboit_user'); window.location.href = '/'; }
        render();
    </script>
</body>
</html>
